name: Apply Final Rostering Lint Fix

on:
  push:
    branches:
      - fix/rostering-unified-workforce

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
      - name: Remove obsolete React import
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("frontend/src/pages/rostering/components/UnifiedRosterSettings.tsx")
          source = path.read_text(encoding="utf-8")
          old = "  useEffect,\n"
          if old not in source:
              raise SystemExit("Obsolete useEffect import was not found")
          path.write_text(source.replace(old, "", 1), encoding="utf-8")
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/pages/rostering/components/UnifiedRosterSettings.tsx
          git commit -m "Remove obsolete rostering React import"
          git push origin HEAD:fix/rostering-unified-workforce
