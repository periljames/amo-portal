name: PR333 Provider Execution Fix

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: pr333-provider-execution-fix
  cancel-in-progress: false

jobs:
  fix-and-validate:
    if: github.actor == 'periljames'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      APP_ENV: test
      ALLOW_SQLITE_FOR_TESTS: "1"
      SECRET_KEY: pr333-provider-execution-fix-secret
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      DATABASE_WRITE_URL: "sqlite+pysqlite:///:memory:"
      DATABASE_READ_URL: "sqlite+pysqlite:///:memory:"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/saas-control-plane-hardening
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies with bounded transient retries
        run: >-
          python .github/scripts/retry_transient.py
          --attempts 4
          --label "PR333 provider execution dependency install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r backend/requirements.txt
      - name: Apply provider execution safeguards
        run: python .github/scripts/apply_pr333_provider_execution_fix.py
      - name: Compile changed modules and tests
        run: >-
          python -m py_compile
          backend/amodb/apps/platform/saas_services.py
          backend/amodb/apps/platform/saas_side_effects.py
          backend/amodb/apps/platform/tests/test_saas_execution_policy.py
          backend/amodb/apps/platform/tests/test_saas_side_effect_safety.py
      - name: Run provider execution regressions
        working-directory: backend
        run: >-
          pytest -q
          amodb/apps/platform/tests/test_saas_execution_policy.py
          amodb/apps/platform/tests/test_saas_side_effect_safety.py
          amodb/apps/platform/tests/test_saas_tenant_job_access.py
      - name: Run SaaS release contract
        working-directory: backend
        run: python -m amodb.scripts.saas_release_cleanup_check
      - name: Commit validated provider safeguards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/amodb/apps/platform/saas_services.py \
            backend/amodb/apps/platform/saas_side_effects.py \
            backend/amodb/apps/platform/tests/test_saas_side_effect_safety.py
          git diff --cached --check
          git commit -m "Recheck provider state before side effects"
          git push origin HEAD:agent/saas-control-plane-hardening
