name: PR333 Release Candidate Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
          show-progress: false
      - name: Apply audited rostering lint fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected source block not found in {path}: {old[:100]!r}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          planner = "frontend/src/pages/rostering/components/RosterPlannerV2.tsx"
          replace(
              planner,
              '''function commitmentIcon(sourceModule: string) {
            if (sourceModule === "TRAINING") return GraduationCap;
            if (sourceModule === "QUALITY") return ShieldCheck;
            return Umbrella;
          }''',
              '''function CommitmentSourceIcon({ sourceModule }: { sourceModule: string }) {
            if (sourceModule === "TRAINING") return <GraduationCap size={12} aria-hidden="true" />;
            if (sourceModule === "QUALITY") return <ShieldCheck size={12} aria-hidden="true" />;
            return <Umbrella size={12} aria-hidden="true" />;
          }''',
          )
          replace(
              planner,
              '''function CommitmentCard({ commitment }: { commitment: RosterCommitmentRead }) {
            const Icon = commitmentIcon(commitment.source_module);
            return (''',
              '''function CommitmentCard({ commitment }: { commitment: RosterCommitmentRead }) {
            return (''',
          )
          replace(planner, '''      <Icon size={12} aria-hidden="true" />''', '''      <CommitmentSourceIcon sourceModule={commitment.source_module} />''')

          replace(
              "frontend/src/pages/rostering/components/RosterCommitmentBoard.tsx",
              '''  const items = query.data?.items || [];''',
              '''  const items = useMemo(() => query.data?.items || [], [query.data?.items]);''',
          )

          settings = "frontend/src/pages/rostering/components/UnifiedRosterSettings.tsx"
          replace(
              settings,
              '''  const people = peopleQuery.data?.items || [];''',
              '''  const people = useMemo(() => peopleQuery.data?.items || [], [peopleQuery.data?.items]);''',
          )
          replace(
              settings,
              '''  const [timezoneName, setTimezoneName] = useState(periods[0]?.timezone_name || "UTC");

            useEffect(() => {
              if (periods[0]?.timezone_name) setTimezoneName(periods[0].timezone_name);
            }, [periods]);''',
              '''  const [timezoneOverride, setTimezoneOverride] = useState("");
            const timezoneName = timezoneOverride || periods[0]?.timezone_name || "UTC";''',
          )
          replace(settings, '''            <input value={timezoneName} onChange={(event) => setTimezoneName(event.target.value)} />''', '''            <input value={timezoneName} onChange={(event) => setTimezoneOverride(event.target.value)} />''')
          replace(
              settings,
              '''  const dutyShifts = shifts.filter((shift) => shift.counts_as_duty && shift.is_active);''',
              '''  const dutyShifts = useMemo(
                () => shifts.filter((shift) => shift.counts_as_duty && shift.is_active),
                [shifts],
              );''',
          )
          replace(
              settings,
              '''  useEffect(() => {
              if (!shiftId && dutyShifts[0]) setShiftId(dutyShifts[0].id);
            }, [dutyShifts, shiftId]);

            const selectedShift = shifts.find((shift) => shift.id === shiftId);''',
              '''  const effectiveShiftId = shiftId || dutyShifts[0]?.id || "";
            const selectedShift = shifts.find((shift) => shift.id === effectiveShiftId);''',
          )
          replace(settings, '''            <select value={shiftId} onChange={(event) => setShiftId(event.target.value)}>''', '''            <select value={effectiveShiftId} onChange={(event) => setShiftId(event.target.value)}>''')
          replace(settings, '''            disabled={!code || !name || !shiftId || busy === "pattern"}''', '''            disabled={!code || !name || !effectiveShiftId || busy === "pattern"}''')
          replace(settings, '''                  days: buildPatternDays(cycle, dutyDays, shiftId, selectedShift),''', '''                  days: buildPatternDays(cycle, dutyDays, effectiveShiftId, selectedShift),''')
          replace(
              settings,
              '''  useEffect(() => {
              if (!userId && people[0]) setUserId(people[0].user_id);
            }, [people, userId]);

            useEffect(() => {
              if (!baseId && bases[0]) setBaseId(bases[0].id);
            }, [bases, baseId]);''',
              '''  const effectiveUserId = userId || people[0]?.user_id || "";
            const effectiveBaseId = baseId || bases[0]?.id || "";''',
          )
          replace(settings, '''            <select value={userId} onChange={(event) => setUserId(event.target.value)}>''', '''            <select value={effectiveUserId} onChange={(event) => setUserId(event.target.value)}>''')
          replace(settings, '''            <select value={baseId} onChange={(event) => setBaseId(event.target.value)}>''', '''            <select value={effectiveBaseId} onChange={(event) => setBaseId(event.target.value)}>''')
          replace(settings, '''            disabled={!userId || !baseId || busy === "contract"}''', '''            disabled={!effectiveUserId || !effectiveBaseId || busy === "contract"}''')
          replace(settings, '''                  user_id: userId,''', '''                  user_id: effectiveUserId,''')
          replace(settings, '''                  primary_base_station_id: baseId,''', '''                  primary_base_station_id: effectiveBaseId,''')

          hook = "frontend/src/pages/rostering/hooks/useRosterPlannerDataV2.ts"
          replace(hook, '''  const periods = periodsQuery.data || [];''', '''  const periods = useMemo(() => periodsQuery.data || [], [periodsQuery.data]);''')
          replace(hook, '''  const peoplePages = peopleQuery.data?.pages || [];''', '''  const peoplePages = useMemo(() => peopleQuery.data?.pages || [], [peopleQuery.data?.pages]);''')

          replace("frontend/src/pages/rostering/components/ComplianceImpact.tsx", '''  }, [range.from, range.to]);''', '''  }, [range]);''')
          replace("frontend/src/pages/rostering/components/MyRosterWorkspace.tsx", '''  }, [leaveTypeId, range.from, range.to, userId]);''', '''  }, [leaveTypeId, range, userId]);''')
          replace("frontend/src/pages/rostering/components/RosterReports.tsx", '''  }, [range.from, range.to]);''', '''  }, [range]);''')
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/pages/rostering
          git commit -m "Resolve rostering React lint findings"
          git push origin HEAD:fix/rostering-unified-workforce
