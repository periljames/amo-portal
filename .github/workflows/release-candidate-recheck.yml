name: PR333 Release Candidate Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
          show-progress: false
      - name: Close bulk and pattern integrity bypass
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          assignments_path = Path("backend/amodb/apps/rostering/assignments.py")
          source = assignments_path.read_text(encoding="utf-8")
          old = '''                row = _create_assignment_row(db, version=version, actor_user_id=actor_user_id, payload=create_payload, bump_parent=False)
          '''
          new = '''                from .services import _ensure_source_owned_state

                _ensure_source_owned_state(
                    db,
                    amo_id=version.amo_id,
                    user_id=create_payload.user_id,
                    starts_at=create_payload.starts_at,
                    ends_at=create_payload.ends_at,
                    assignment_status=create_payload.status,
                    assignment_source=create_payload.source,
                    source_reference_id=create_payload.source_reference_id,
                )
                row = _create_assignment_row(db, version=version, actor_user_id=actor_user_id, payload=create_payload, bump_parent=False)
          '''
          if old not in source:
              raise SystemExit("Bulk assignment creation insertion point not found")
          assignments_path.write_text(source.replace(old, new), encoding="utf-8")

          test_path = Path("backend/amodb/apps/rostering/tests/test_source_owned_state.py")
          tests = test_path.read_text(encoding="utf-8")
          import_old = '''from datetime import datetime, timedelta, timezone

import pytest
'''
          import_new = '''from datetime import datetime, timedelta, timezone
import inspect

import pytest

from amodb.apps.rostering import assignments
'''
          if import_old not in tests:
              raise SystemExit("Test import insertion point not found")
          tests = tests.replace(import_old, import_new)
          tests += '''

def test_bulk_and_pattern_generation_share_source_owned_integrity_guard():
    source = inspect.getsource(assignments.bulk_create_assignments)
    assert "_ensure_source_owned_state(" in source
    assert "create_payload.user_id" in source
    assert "create_payload.starts_at" in source
    assert "create_payload.ends_at" in source
'''
          test_path.write_text(tests, encoding="utf-8")
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/amodb/apps/rostering/assignments.py backend/amodb/apps/rostering/tests/test_source_owned_state.py
          git commit -m "Enforce source integrity in bulk roster generation"
          git push origin HEAD:fix/rostering-unified-workforce
