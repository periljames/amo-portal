name: PR333 Release Candidate Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Lint integrated rostering surfaces
        working-directory: frontend
        run: |
          set -o pipefail
          npm exec -- eslint src/pages/rostering src/services/rosterCommitments.ts src/services/rostering.ts 2>&1 | tee /tmp/rostering-eslint.log
      - name: Upload rostering lint diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rostering-eslint
          path: /tmp/rostering-eslint.log
          if-no-files-found: warn
          retention-days: 2
