name: PR333 Quality Regression Diagnostics

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

concurrency:
  group: pr333-quality-regression-diagnostics
  cancel-in-progress: true

jobs:
  quality-regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_pr333_quality
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_pr333_quality"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_ENV: test
      ALLOW_SQLITE_FOR_TESTS: "1"
      SECRET_KEY: pr333-quality-diagnostic-secret
      QUALITY_SCHEMA_STRICT: "0"
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_pr333_quality
      DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_pr333_quality
      DATABASE_READ_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_pr333_quality
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies with bounded transient retries
        run: >-
          python .github/scripts/retry_transient.py
          --attempts 4
          --label "PR333 Quality diagnostic dependency install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r backend/requirements.txt
      - name: Upgrade clean PostgreSQL schema
        working-directory: backend
        run: alembic -c amodb/alembic.ini upgrade heads
      - name: Run Quality regressions with complete diagnostics
        working-directory: backend
        run: |
          set -o pipefail
          pytest -vv --tb=long \
            amodb/apps/quality/tests/test_quality_delivery_profile.py \
            amodb/apps/quality/tests/test_workflow_transitions.py \
            amodb/apps/quality/tests/test_audit_workflow_enforcement.py \
            amodb/apps/quality/tests/test_audit_events.py \
            amodb/apps/quality/tests/test_task_integrations.py \
            amodb/apps/quality/tests/test_evidence_pack_exports.py \
            2>&1 | tee /tmp/pr333-quality-pytest.log
      - name: Upload Quality pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pr333-quality-pytest
          path: /tmp/pr333-quality-pytest.log
          if-no-files-found: warn
          retention-days: 2
