name: Diagnose Rostering Governance Repair

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
          show-progress: false
      - name: Extract source and repair steps
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          lines = Path('.github/workflows/finalize-rostering-governance-fixed.yml').read_text(encoding='utf-8').splitlines()

          def extract(name: str, target: str) -> None:
              marker = f'      - name: {name}'
              start = lines.index(marker)
              run_line = next(index for index in range(start, len(lines)) if lines[index].strip() == 'run: |')
              end = next((index for index in range(run_line + 1, len(lines)) if lines[index].startswith('      - name: ')), len(lines))
              body = [line[10:] if line.startswith('          ') else line for line in lines[run_line + 1:end]]
              Path(target).write_text('\n'.join(body) + '\n', encoding='utf-8')

          extract('Reproduce governance source transformation', '/tmp/reproduce-governance.sh')
          extract('Repair generated source blocks', '/tmp/repair-governance.sh')
          PY
          bash /tmp/reproduce-governance.sh
      - name: Capture repair failure
        shell: bash
        run: |
          set +e
          bash /tmp/repair-governance.sh > /tmp/rostering-governance-repair.log 2>&1
          status=$?
          cat /tmp/rostering-governance-repair.log
          echo "$status" > /tmp/rostering-governance-repair.exit-code
          exit 0
      - name: Upload repair diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rostering-governance-repair-diagnostics
          path: |
            /tmp/rostering-governance-repair.log
            /tmp/rostering-governance-repair.exit-code
          retention-days: 1
