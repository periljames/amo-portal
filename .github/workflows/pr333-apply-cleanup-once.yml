name: Apply PR333 cleanup once

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pr333-one-time-cleanup
  cancel-in-progress: false

jobs:
  apply-validated-cleanup:
    if: github.actor == 'periljames' || github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/saas-control-plane-hardening
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Assemble and verify cleanup sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/pr333-validation
          cat .github/maintenance/pr333/offline.*.b64 | tr -d '\r\n' | base64 --decode > /tmp/offlinePersistence.ts
          cp .github/maintenance/pr333/presence_policy.py.new /tmp/presence_policy.py
          cp .github/maintenance/pr333/rosteringArchitecture.test.ts.new /tmp/rosteringArchitecture.test.ts
          printf '%s  %s\n' \
            '0274283e21ec867ba6b8fb4c94d957770914ce6c61836235b8823d5437044761' /tmp/offlinePersistence.ts \
            '5541d0e198028302b4abb5e35ed7ec002cafa1246a741f96f4383e9862804ad7' /tmp/presence_policy.py \
            '2d4682b517f706ea7501fdcdcbbeffa2dccb444a15818f4d56b7085dea88a48b' /tmp/rosteringArchitecture.test.ts \
            | sha256sum --check --strict
          install -m 0644 /tmp/offlinePersistence.ts frontend/src/services/offlinePersistence.ts
          install -m 0644 /tmp/presence_policy.py backend/amodb/apps/accounts/presence_policy.py
          install -m 0644 /tmp/rosteringArchitecture.test.ts frontend/src/pages/rostering/rosteringArchitecture.test.ts
      - name: Compile inherited presence policy cleanup
        shell: bash
        run: |
          set -o pipefail
          python -m py_compile backend/amodb/apps/accounts/presence_policy.py 2>&1 | tee /tmp/pr333-validation/python-compile.log
      - name: Install frontend dependencies with bounded transient retries
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          python ../.github/scripts/retry_transient.py \
            --attempts 4 \
            --label "PR333 cleanup frontend dependency install" \
            -- npm ci --prefer-offline --no-audit --fund=false \
            --fetch-retries=5 --fetch-retry-mintimeout=10000 --fetch-retry-maxtimeout=60000 \
            2>&1 | tee /tmp/pr333-validation/npm-ci.log
      - name: Typecheck and production build
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/pr333-validation/build.log
      - name: Lint offline cleanup
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm exec -- eslint src/services/offlinePersistence.ts src/pages/rostering/rosteringArchitecture.test.ts 2>&1 | tee /tmp/pr333-validation/eslint.log
      - name: Run offline regressions
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm exec -- vitest run src/pages/rostering/rosteringArchitecture.test.ts 2>&1 | tee /tmp/pr333-validation/vitest.log
      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pr333-inherited-cleanup-validation
          path: /tmp/pr333-validation
          if-no-files-found: warn
          retention-days: 2
      - name: Commit validated source cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .github/maintenance/pr333
          git add \
            frontend/src/services/offlinePersistence.ts \
            frontend/src/pages/rostering/rosteringArchitecture.test.ts \
            backend/amodb/apps/accounts/presence_policy.py
          git diff --cached --check
          git commit -m "Fix inherited offline and presence regressions"
          git push origin HEAD:agent/saas-control-plane-hardening
