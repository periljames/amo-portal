name: PR333 Quality Fixture Fix Diagnostics

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: pr333-quality-fixture-fix-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      APP_ENV: test
      ALLOW_SQLITE_FOR_TESTS: "1"
      SECRET_KEY: pr333-quality-fixture-diagnostic-secret
      QUALITY_SCHEMA_STRICT: "0"
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      DATABASE_WRITE_URL: "sqlite+pysqlite:///:memory:"
      DATABASE_READ_URL: "sqlite+pysqlite:///:memory:"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/saas-control-plane-hardening
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies with bounded transient retries
        run: >-
          python .github/scripts/retry_transient.py
          --attempts 4
          --label "PR333 Quality fixture diagnostic install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r backend/requirements.txt
      - name: Apply exact candidate fixes in the diagnostic workspace
        run: python .github/scripts/apply_pr333_quality_fixture_fix.py
      - name: Run focused Quality regressions with full traceback
        working-directory: backend
        run: |
          set -o pipefail
          pytest -vv --tb=long \
            amodb/apps/quality/tests/test_quality_delivery_profile.py \
            amodb/apps/quality/tests/test_workflow_transitions.py \
            amodb/apps/quality/tests/test_audit_workflow_enforcement.py \
            amodb/apps/quality/tests/test_audit_events.py \
            amodb/apps/quality/tests/test_task_integrations.py \
            amodb/apps/quality/tests/test_evidence_pack_exports.py \
            2>&1 | tee /tmp/pr333-quality-fixture-fix.log
      - name: Upload candidate-fix diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pr333-quality-fixture-fix
          path: /tmp/pr333-quality-fixture-fix.log
          if-no-files-found: warn
          retention-days: 2
