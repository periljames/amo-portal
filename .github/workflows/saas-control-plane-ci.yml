name: SaaS Control Plane CI

on:
  pull_request:
    paths:
      - "backend/amodb/apps/platform/**"
      - "backend/amodb/apps/accounts/**"
      - "backend/amodb/jobs/saas_worker.py"
      - "backend/amodb/jobs/platform_command_worker.py"
      - "backend/amodb/alembic/versions/saas_*.py"
      - "backend/amodb/scripts/saas_control_plane_internal_check.py"
      - "backend/docs/platform/**"
      - "frontend/src/services/platformControl*"
      - "frontend/src/pages/platform/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "loadtests/**"
      - "deploy/saas/**"
      - ".github/workflows/saas-control-plane-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: saas-control-plane-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_saas_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      SECRET_KEY: saas-control-plane-ci-secret
      PLATFORM_SECRETS_KEY: 5T4IWN4Fkif7LtiH2tGLHSrAX2tyvDEh6bXCWf7cRpU=
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_saas_test
      DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_saas_test
      DATABASE_READ_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_saas_test
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run static SaaS contract gate
        run: python -m amodb.scripts.saas_control_plane_internal_check
      - name: Verify Alembic graph
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          script = ScriptDirectory.from_config(Config("amodb/alembic.ini"))
          revision = script.get_revision("saas_20260722_control_plane")
          assert revision is not None
          assert revision.down_revision == "quality_20260722_schema_integrity"
          heads = script.get_heads()
          print("Alembic heads:", heads)
          assert "saas_20260722_control_plane" in heads
          PY
      - name: Upgrade production schema graph
        run: alembic -c amodb/alembic.ini upgrade heads
      - name: Configure all SQLAlchemy mappers and route contracts
        run: |
          python - <<'PY'
          from sqlalchemy.orm import configure_mappers
          from amodb.main import app

          configure_mappers()
          paths = {route.path for route in app.routes}
          required = {
              "/platform/saas/capabilities",
              "/platform/saas/providers",
              "/platform/saas/jobs",
              "/platform/saas/module-prices",
              "/platform/saas/webhooks/stripe",
              "/platform/saas/support/tickets",
              "/platform/saas/integration-health",
          }
          missing = required - paths
          assert not missing, missing
          print("SaaS route contract verified")
          PY
      - name: Run SaaS unit tests
        run: pytest -q amodb/apps/platform/tests/test_saas_control_plane.py
      - name: Run empty-queue worker smoke tests
        run: |
          python -m amodb.jobs.saas_worker --once --batch-size 5
          python -m amodb.jobs.platform_command_worker --once --batch-size 5

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run platform service regressions
        working-directory: frontend
        run: npm run test:platform
      - name: Typecheck and production build
        working-directory: frontend
        run: npm run build
      - name: Lint changed platform surfaces
        working-directory: frontend
        run: >-
          npm exec -- eslint
          src/services/platformControl.ts
          src/services/platformControl.test.ts
          src/pages/platform/PlatformIntegrationsPage.tsx
          src/pages/platform/PlatformBillingPage.tsx
          src/pages/platform/PlatformTenantsPage.tsx
      - name: Validate k6 script syntax
        run: node --check loadtests/k6_saas_control_plane.js

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Validate compose deployment
        env:
          DATABASE_URL: postgresql+psycopg2://example:example@database.example.invalid:5432/amodb
          SECRET_KEY: compose-validation-secret
          PLATFORM_SECRETS_KEY: 5T4IWN4Fkif7LtiH2tGLHSrAX2tyvDEh6bXCWf7cRpU=
        run: docker compose -f deploy/saas/docker-compose.yml config
