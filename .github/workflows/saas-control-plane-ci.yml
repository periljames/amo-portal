name: SaaS Control Plane CI

on:
  pull_request:
    paths:
      - "backend/amodb/apps/platform/**"
      - "backend/amodb/apps/accounts/**"
      - "backend/amodb/apps/realtime/**"
      - "backend/amodb/jobs/saas_worker.py"
      - "backend/amodb/jobs/platform_command_worker.py"
      - "backend/amodb/alembic/versions/**"
      - "backend/amodb/scripts/saas_control_plane_internal_check.py"
      - "backend/docs/platform/**"
      - "frontend/src/services/platformControl*"
      - "frontend/src/services/messaging*"
      - "frontend/src/services/rostering.ts"
      - "frontend/src/services/rosterPeople.ts"
      - "frontend/src/types/rostering.ts"
      - "frontend/src/components/messaging/**"
      - "frontend/src/components/offline/OfflineSyncIndicator.tsx"
      - "frontend/src/styles/components/messaging.css"
      - "frontend/src/pages/platform/**"
      - "frontend/src/pages/rostering/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "loadtests/**"
      - "deploy/saas/**"
      - ".github/workflows/saas-control-plane-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: saas-control-plane-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_saas_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      SECRET_KEY: saas-control-plane-ci-secret
      PLATFORM_SECRETS_KEY: 5T4IWN4Fkif7LtiH2tGLHSrAX2tyvDEh6bXCWf7cRpU=
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_saas_test
      DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_saas_test
      DATABASE_READ_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_saas_test
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run static SaaS contract gate
        run: python -m amodb.scripts.saas_control_plane_internal_check
      - name: Verify Alembic graph
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          script = ScriptDirectory.from_config(Config("amodb/alembic.ini"))
          foundation = script.get_revision("saas_20260722_control_plane")
          quality_finalizer = script.get_revision("saas_20260722_finalize_idx")
          training_finalizer = script.get_revision("saas_20260722_finalize_training")
          read_index_finalizer = script.get_revision("saas_20260722_qms_read_idx")
          messaging_finalizer = script.get_revision("saas_20260722_messaging")
          assert foundation is not None
          assert foundation.down_revision == "quality_20260722_schema_integrity"
          assert quality_finalizer is not None
          assert quality_finalizer.down_revision == "saas_20260722_control_plane"
          assert training_finalizer is not None
          assert training_finalizer.down_revision == "saas_20260722_finalize_idx"
          assert read_index_finalizer is not None
          assert read_index_finalizer.down_revision == "saas_20260722_finalize_training"
          expected_dependencies = {
              "phase2_8_20260605",
              "phase2_10_20260605",
              "phase2_14_20260615",
          }
          assert set(read_index_finalizer.dependencies or ()) == expected_dependencies
          assert messaging_finalizer is not None
          assert messaging_finalizer.down_revision == "saas_20260722_qms_read_idx"
          heads = script.get_heads()
          print("Alembic heads:", heads)
          assert "saas_20260722_messaging" in heads, heads
          PY
      - name: Upgrade production schema graph
        id: migrate
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          alembic -c amodb/alembic.ini upgrade heads 2>&1 | tee saas-migration.log
      - name: Configure all SQLAlchemy mappers and route contracts
        id: mapper
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee saas-mappers.log
          from sqlalchemy.orm import configure_mappers
          from amodb.main import app

          configure_mappers()
          paths = {route.path for route in app.routes}
          required = {
              "/platform/saas/capabilities",
              "/platform/saas/providers",
              "/platform/saas/jobs",
              "/platform/saas/module-prices",
              "/platform/saas/webhooks/stripe",
              "/platform/saas/support/tickets",
              "/platform/saas/integration-health",
              "/api/chat/directory",
              "/api/chat/direct/{peer_user_id}",
              "/api/chat/departments/{department_id}",
              "/api/chat/groups/{group_id}",
              "/api/chat/threads",
              "/api/chat/threads/{thread_id}/messages",
              "/api/chat/threads/{thread_id}/read",
              "/api/notifications/me",
              "/api/notifications/me/unread-count",
              "/api/notifications/preferences",
          }
          missing = required - paths
          assert not missing, missing
          print("SaaS, messaging and notification route contracts verified")
          PY
      - name: Run SaaS and messaging unit tests
        id: backend_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pytest -q \
            amodb/apps/platform/tests/test_saas_control_plane.py \
            amodb/apps/realtime/tests/test_messaging_hardening.py \
            amodb/apps/realtime/tests/test_realtime_services.py \
            2>&1 | tee saas-backend-tests.log
      - name: Run empty-queue worker smoke tests
        id: workers
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python -m amodb.jobs.saas_worker --once --batch-size 5
            python -m amodb.jobs.platform_command_worker --once --batch-size 5
          } 2>&1 | tee saas-workers.log
      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: saas-backend-diagnostics
          path: |
            backend/saas-migration.log
            backend/saas-mappers.log
            backend/saas-backend-tests.log
            backend/saas-workers.log
          if-no-files-found: warn
          retention-days: 7
      - name: Fail backend gate
        if: >-
          steps.migrate.outcome != 'success' ||
          steps.mapper.outcome != 'success' ||
          steps.backend_tests.outcome != 'success' ||
          steps.workers.outcome != 'success'
        run: exit 1

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run platform and messaging service regressions
        id: frontend_tests
        continue-on-error: true
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm run test:platform 2>&1 | tee platform-tests.log
      - name: Typecheck and production build
        id: frontend_build
        continue-on-error: true
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee platform-build.log
      - name: Lint changed platform, messaging and roster surfaces
        id: frontend_lint
        continue-on-error: true
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm exec -- eslint \
            src/services/platformControl.ts \
            src/services/platformControl.test.ts \
            src/services/messaging.ts \
            src/services/messaging.test.ts \
            src/services/rostering.ts \
            src/components/messaging/MessagingHub.tsx \
            src/components/offline/OfflineSyncIndicator.tsx \
            src/pages/platform/PlatformIntegrationsPage.tsx \
            src/pages/platform/PlatformBillingPage.tsx \
            src/pages/platform/PlatformTenantsPage.tsx \
            src/pages/rostering/hooks/useRosterPlannerDataV2.ts \
            2>&1 | tee platform-lint.log
      - name: Validate k6 script syntax
        id: k6_syntax
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node --check loadtests/k6_saas_control_plane.js 2>&1 | tee frontend/platform-k6.log
      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: saas-frontend-diagnostics
          path: |
            frontend/platform-tests.log
            frontend/platform-build.log
            frontend/platform-lint.log
            frontend/platform-k6.log
          if-no-files-found: warn
          retention-days: 7
      - name: Fail frontend gate
        if: >-
          steps.frontend_tests.outcome != 'success' ||
          steps.frontend_build.outcome != 'success' ||
          steps.frontend_lint.outcome != 'success' ||
          steps.k6_syntax.outcome != 'success'
        run: exit 1

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Validate compose deployment
        env:
          DATABASE_URL: postgresql+psycopg2://example:example@database.example.invalid:5432/amodb
          SECRET_KEY: compose-validation-secret
          PLATFORM_SECRETS_KEY: 5T4IWN4Fkif7LtiH2tGLHSrAX2tyvDEh6bXCWf7cRpU=
        run: docker compose -f deploy/saas/docker-compose.yml config
