name: SaaS Control Plane CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
    paths:
      - "backend/**"
      - "frontend/**"
      - "deploy/saas/**"
      - "loadtests/**"
      - ".github/scripts/**"
      - ".github/workflows/saas-control-plane-ci.yml"
      - ".github/workflows/main-merge-readiness.yml"
      - ".github/workflows/recheck-transient-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: saas-control-plane-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  schema-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_saas_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      SECRET_KEY: saas-control-plane-ci-secret
      PLATFORM_SECRETS_KEY: 5T4IWN4Fkif7LtiH2tGLHSrAX2tyvDEh6bXCWf7cRpU=
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_saas_test
      DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_saas_test
      DATABASE_READ_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_saas_test
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies with bounded transient retries
        run: >-
          python ../.github/scripts/retry_transient.py
          --attempts 4
          --label "schema dependency install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r requirements.txt
      - name: Run Quality, SaaS and release contracts
        run: |
          python -m amodb.scripts.quality_module_internal_check
          python -m amodb.scripts.saas_control_plane_internal_check
          python -m amodb.scripts.saas_release_cleanup_check
      - name: Verify Alembic graph
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          script = ScriptDirectory.from_config(Config("amodb/alembic.ini"))
          heads = script.get_heads()
          print("Alembic heads:", heads)
          assert len(heads) == len(set(heads)), heads
          assert script.get_revision("workforce_20260721_complete")
          assert script.get_revision("quality_20260722_schema_integrity")
          terminal = script.get_revision("saas_20260722_side_effect_safe")
          assert terminal and terminal.down_revision == "saas_20260722_runtime_fence"
          assert "saas_20260722_side_effect_safe" in heads, heads
          PY
      - name: Upgrade production schema graph
        id: migrate
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          alembic -c amodb/alembic.ini upgrade heads 2>&1 | tee merge-readiness-migration.log
      - name: Configure all mappers and route contracts
        id: mapper_routes
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee merge-readiness-mappers.log
          from sqlalchemy.orm import configure_mappers
          from amodb.main import app
          import amodb.quality_main

          configure_mappers()
          paths = {route.path for route in app.routes}
          required = {
              "/platform/saas/capabilities",
              "/platform/saas/providers",
              "/platform/saas/jobs",
              "/platform/saas/webhooks/stripe",
              "/platform/saas/integration-health",
              "/platform/tenant-saas/setup",
              "/platform/tenant-saas/providers/{provider}",
              "/platform/tenant-saas/jobs",
              "/platform/tenant-saas/checkout",
              "/platform/tenant-saas/invoices/{invoice_id}/fiscalize",
              "/api/realtime/broker/authenticate",
              "/api/realtime/broker/authorize",
              "/api/chat/threads",
              "/api/notifications/me",
          }
          missing = required - paths
          assert not missing, missing
          print("All application mappers and critical routes verified")
          PY
      - name: Run lease-fenced worker smoke tests
        id: workers
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python -m amodb.jobs.saas_worker_safe --once --batch-size 5
            python -m amodb.jobs.platform_command_worker --once --batch-size 5
          } 2>&1 | tee merge-readiness-workers.log
      - name: Upload schema diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: main-schema-diagnostics
          path: |
            backend/merge-readiness-migration.log
            backend/merge-readiness-mappers.log
            backend/merge-readiness-workers.log
          if-no-files-found: warn
          retention-days: 7
      - name: Fail schema and worker gate
        if: >-
          steps.migrate.outcome != 'success' ||
          steps.mapper_routes.outcome != 'success' ||
          steps.workers.outcome != 'success'
        run: exit 1

  quality-postgres-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_quality_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_quality_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies with bounded transient retries
        run: >-
          python ../.github/scripts/retry_transient.py
          --attempts 4
          --label "quality PostgreSQL dependency install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r requirements.txt
      - name: Run Quality fallback-schema hardening probe
        id: quality_schema
        continue-on-error: true
        env:
          APP_ENV: test
          SECRET_KEY: quality-postgres-test-secret
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_quality_test
          DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_quality_test
        shell: bash
        run: |
          set -o pipefail
          python -m amodb.apps.quality.tests.postgres_schema_integrity_probe 2>&1 | tee quality-postgres-schema.log
      - name: Upload Quality schema diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: quality-postgres-schema-log
          path: backend/quality-postgres-schema.log
          if-no-files-found: warn
          retention-days: 7
      - name: Fail Quality schema gate
        if: steps.quality_schema.outcome != 'success'
        run: exit 1

  backend-regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      ALLOW_SQLITE_FOR_TESTS: "1"
      DATABASE_URL: sqlite+pysqlite:///:memory:
      DATABASE_WRITE_URL: sqlite+pysqlite:///:memory:
      SECRET_KEY: integrated-backend-test-secret
      PLATFORM_SECRETS_KEY: 5T4IWN4Fkif7LtiH2tGLHSrAX2tyvDEh6bXCWf7cRpU=
      QUALITY_SCHEMA_STRICT: "0"
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies with bounded transient retries
        run: >-
          python ../.github/scripts/retry_transient.py
          --attempts 4
          --label "integrated regression dependency install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r requirements.txt
      - name: Compile cleanup-sensitive backend modules
        run: >-
          python -m compileall -q
          amodb/apps/accounts
          amodb/apps/audit
          amodb/apps/platform
          amodb/apps/quality
          amodb/apps/realtime
          amodb/apps/rostering
          amodb/apps/training
          amodb/apps/workforce
          amodb/jobs
      - name: Configure complete SQLAlchemy mapper startup
        run: python -c "from sqlalchemy.orm import configure_mappers; import amodb.main; import amodb.quality_main; configure_mappers(); print('All application mappers configured')"
      - name: Run Quality workflow regressions
        run: >-
          pytest -q
          amodb/apps/quality/tests/test_quality_delivery_profile.py
          amodb/apps/quality/tests/test_workflow_transitions.py
          amodb/apps/quality/tests/test_audit_workflow_enforcement.py
          amodb/apps/quality/tests/test_audit_events.py
          amodb/apps/quality/tests/test_task_integrations.py
          amodb/apps/quality/tests/test_evidence_pack_exports.py
      - name: Run account, Workforce and Rostering regressions
        run: pytest -q amodb/apps/accounts/tests amodb/apps/workforce/tests amodb/apps/rostering/tests
      - name: Run SaaS and realtime regressions
        run: pytest -q amodb/apps/platform/tests/test_saas_*.py amodb/apps/realtime/tests/test_*.py

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies with bounded transient retries
        working-directory: frontend
        run: >-
          python ../.github/scripts/retry_transient.py
          --attempts 4
          --label "integrated frontend dependency install"
          -- npm ci --prefer-offline --no-audit --fund=false
          --fetch-retries=5 --fetch-retry-mintimeout=10000 --fetch-retry-maxtimeout=60000
      - name: Run Quality and SaaS service regressions
        id: service_tests
        continue-on-error: true
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          {
            npm run test:quality
            npm run test:platform
          } 2>&1 | tee integrated-service-tests.log
      - name: Run Rostering and offline regressions
        id: rostering_tests
        continue-on-error: true
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm exec -- vitest run src/pages/rostering src/services/offlineHttp.test.ts 2>&1 | tee integrated-rostering-tests.log
      - name: Typecheck and production build
        id: frontend_build
        continue-on-error: true
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee integrated-build.log
      - name: Lint integrated cleanup surfaces
        id: frontend_lint
        continue-on-error: true
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm exec -- eslint \
            src/main.tsx \
            src/components/messaging \
            src/components/offline \
            src/pages/AdminSaaSSettingsPage.tsx \
            src/pages/EmailServerSettingsPage.tsx \
            src/pages/platform \
            src/pages/rostering \
            src/services/apiClient.ts \
            src/services/crs.ts \
            src/services/fleet.ts \
            src/services/maintenance.ts \
            src/services/messaging.ts \
            src/services/messaging.test.ts \
            src/services/offlineHttp.ts \
            src/services/offlinePersistence.ts \
            src/services/platformControl.ts \
            src/services/platformControl.test.ts \
            src/services/qmsAuditHubActions.ts \
            src/services/qmsAuditHubActions.test.ts \
            src/services/queryPersister.ts \
            src/services/realtime \
            src/services/rostering.ts \
            src/services/saasSettings.ts \
            src/services/saasSettings.test.ts \
            src/services/typedApi.ts \
            src/services/workOrders.ts \
            2>&1 | tee integrated-lint.log
      - name: Validate k6 script syntax
        id: k6_syntax
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node --check loadtests/k6_saas_control_plane.js 2>&1 | tee frontend/integrated-k6.log
      - name: Upload frontend diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: integrated-frontend-diagnostics
          path: |
            frontend/integrated-service-tests.log
            frontend/integrated-rostering-tests.log
            frontend/integrated-build.log
            frontend/integrated-lint.log
            frontend/integrated-k6.log
          if-no-files-found: warn
          retention-days: 7
      - name: Fail integrated frontend gate
        if: >-
          steps.service_tests.outcome != 'success' ||
          steps.rostering_tests.outcome != 'success' ||
          steps.frontend_build.outcome != 'success' ||
          steps.frontend_lint.outcome != 'success' ||
          steps.k6_syntax.outcome != 'success'
        run: exit 1

  deployment-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Validate retry wrapper semantics
        run: >-
          python .github/scripts/retry_transient.py
          --attempts 1
          --label "retry wrapper smoke test"
          -- python -c "print('retry wrapper ready')"
      - name: Validate compose deployment
        env:
          DATABASE_URL: postgresql+psycopg2://example:example@database.example.invalid:5432/amodb
          SECRET_KEY: compose-validation-secret
          PLATFORM_SECRETS_KEY: 5T4IWN4Fkif7LtiH2tGLHSrAX2tyvDEh6bXCWf7cRpU=
          CORS_ALLOWED_ORIGINS: https://portal.example.invalid
          MQTT_BROKER_INTERNAL_URL: mqtt://broker.example.invalid:1883
          MQTT_BROKER_WS_URL: wss://broker.example.invalid/mqtt
          REALTIME_BROKER_WEBHOOK_SECRET: ci-broker-webhook-secret-more-than-32-characters
          REALTIME_GATEWAY_USERNAME: amo-gateway
          REALTIME_GATEWAY_PASSWORD: ci-gateway-password-more-than-24-characters
        run: docker compose -f deploy/saas/docker-compose.yml config
