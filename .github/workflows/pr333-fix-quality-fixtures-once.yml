name: Fix PR333 Quality tenant fixtures once

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: pr333-fix-quality-fixtures-once
  cancel-in-progress: false

jobs:
  fix-and-validate:
    if: github.actor == 'periljames'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      APP_ENV: test
      ALLOW_SQLITE_FOR_TESTS: "1"
      SECRET_KEY: pr333-quality-fixture-fix-secret
      QUALITY_SCHEMA_STRICT: "0"
      DATABASE_URL: sqlite+pysqlite:///:memory:
      DATABASE_WRITE_URL: sqlite+pysqlite:///:memory:
      DATABASE_READ_URL: sqlite+pysqlite:///:memory:
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/saas-control-plane-hardening
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies with bounded transient retries
        run: >-
          python .github/scripts/retry_transient.py
          --attempts 4
          --label "PR333 Quality fixture dependency install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r backend/requirements.txt
      - name: Apply exact tenant fixture and dialect fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str, expected: int = 1) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              actual = text.count(old)
              if actual != expected:
                  raise SystemExit(f"{path}: expected {expected} occurrences, found {actual}: {old!r}")
              file_path.write_text(text.replace(old, new), encoding="utf-8")

          replace_exact(
              "backend/amodb/apps/quality/schema_compat.py",
              "    changed = False\n    inspector = inspect(db.get_bind())\n",
              "    bind = db.get_bind()\n    if getattr(bind.dialect, \"name\", \"\") != \"postgresql\":\n        return False\n\n    changed = False\n    inspector = inspect(bind)\n",
          )

          replace_exact(
              "backend/amodb/apps/quality/tests/test_workflow_transitions.py",
              "    finding = quality_models.QMSAuditFinding(\n        audit_id=audit.id,\n",
              "    finding = quality_models.QMSAuditFinding(\n        amo_id=amo.id,\n        audit_id=audit.id,\n",
              expected=4,
          )
          replace_exact(
              "backend/amodb/apps/quality/tests/test_workflow_transitions.py",
              "    cap = quality_models.QMSCorrectiveAction(\n        finding_id=finding.id,\n",
              "    cap = quality_models.QMSCorrectiveAction(\n        amo_id=amo.id,\n        finding_id=finding.id,\n",
          )

          replace_exact(
              "backend/amodb/apps/quality/tests/test_audit_workflow_enforcement.py",
              "    _, quality, _, audit = _seed_audit(db_session)\n",
              "    amo, quality, _, audit = _seed_audit(db_session)\n",
              expected=2,
          )
          replace_exact(
              "backend/amodb/apps/quality/tests/test_audit_workflow_enforcement.py",
              "    _, _, _, audit = _seed_audit(db_session)\n",
              "    amo, _, _, audit = _seed_audit(db_session)\n",
          )
          replace_exact(
              "backend/amodb/apps/quality/tests/test_audit_workflow_enforcement.py",
              "    finding = quality_models.QMSAuditFinding(\n        audit_id=audit.id,\n",
              "    finding = quality_models.QMSAuditFinding(\n        amo_id=amo.id,\n        audit_id=audit.id,\n",
              expected=3,
          )
          replace_exact(
              "backend/amodb/apps/quality/tests/test_audit_workflow_enforcement.py",
              "    car = quality_models.CorrectiveActionRequest(\n        program=quality_models.CARProgram.QUALITY,\n",
              "    car = quality_models.CorrectiveActionRequest(\n        amo_id=amo.id,\n        program=quality_models.CARProgram.QUALITY,\n",
              expected=2,
          )
          replace_exact(
              "backend/amodb/apps/quality/tests/test_audit_workflow_enforcement.py",
              "    schedule = quality_models.QMSAuditSchedule(\n        domain=quality_models.QMSDomain.AMO,\n",
              "    schedule = quality_models.QMSAuditSchedule(\n        amo_id=amo.id,\n        domain=quality_models.QMSDomain.AMO,\n",
          )

          replace_exact(
              "backend/amodb/apps/quality/tests/test_audit_events.py",
              "    doc = quality_models.QMSDocument(\n        domain=quality_models.QMSDomain.AMO,\n",
              "    doc = quality_models.QMSDocument(\n        amo_id=amo.id,\n        domain=quality_models.QMSDomain.AMO,\n",
          )
          replace_exact(
              "backend/amodb/apps/quality/tests/test_audit_events.py",
              "    finding = quality_models.QMSAuditFinding(\n        audit_id=audit.id,\n",
              "    finding = quality_models.QMSAuditFinding(\n        amo_id=amo.id,\n        audit_id=audit.id,\n",
          )
          replace_exact(
              "backend/amodb/apps/quality/tests/test_audit_events.py",
              "    car = quality_service.create_car(\n        db_session,\n        program=quality_models.CARProgram.QUALITY,\n",
              "    car = quality_service.create_car(\n        db_session,\n        amo_id=amo.id,\n        program=quality_models.CARProgram.QUALITY,\n",
          )

          replace_exact(
              "backend/amodb/apps/quality/tests/test_task_integrations.py",
              "    doc = quality_models.QMSDocument(\n        domain=quality_models.QMSDomain.AMO,\n",
              "    doc = quality_models.QMSDocument(\n        amo_id=amo.id,\n        domain=quality_models.QMSDomain.AMO,\n",
          )
          replace_exact(
              "backend/amodb/apps/quality/tests/test_task_integrations.py",
              "    finding = quality_models.QMSAuditFinding(\n        audit_id=audit.id,\n",
              "    finding = quality_models.QMSAuditFinding(\n        amo_id=amo.id,\n        audit_id=audit.id,\n",
          )

          replace_exact(
              "backend/amodb/apps/quality/tests/test_evidence_pack_exports.py",
              "    car = quality_service.create_car(\n        db_session,\n        program=quality_models.CARProgram.QUALITY,\n",
              "    car = quality_service.create_car(\n        db_session,\n        amo_id=amo.id,\n        program=quality_models.CARProgram.QUALITY,\n",
          )
          PY
      - name: Compile changed Quality modules
        run: >-
          python -m py_compile
          backend/amodb/apps/quality/schema_compat.py
          backend/amodb/apps/quality/tests/test_workflow_transitions.py
          backend/amodb/apps/quality/tests/test_audit_workflow_enforcement.py
          backend/amodb/apps/quality/tests/test_audit_events.py
          backend/amodb/apps/quality/tests/test_task_integrations.py
          backend/amodb/apps/quality/tests/test_evidence_pack_exports.py
      - name: Run focused Quality regressions
        working-directory: backend
        run: >-
          pytest -q
          amodb/apps/quality/tests/test_quality_delivery_profile.py
          amodb/apps/quality/tests/test_workflow_transitions.py
          amodb/apps/quality/tests/test_audit_workflow_enforcement.py
          amodb/apps/quality/tests/test_audit_events.py
          amodb/apps/quality/tests/test_task_integrations.py
          amodb/apps/quality/tests/test_evidence_pack_exports.py
      - name: Verify Quality release contract
        run: python backend/amodb/scripts/quality_module_internal_check.py
      - name: Commit validated Quality fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/amodb/apps/quality/schema_compat.py \
            backend/amodb/apps/quality/tests/test_workflow_transitions.py \
            backend/amodb/apps/quality/tests/test_audit_workflow_enforcement.py \
            backend/amodb/apps/quality/tests/test_audit_events.py \
            backend/amodb/apps/quality/tests/test_task_integrations.py \
            backend/amodb/apps/quality/tests/test_evidence_pack_exports.py
          git diff --cached --check
          git commit -m "Repair tenant-scoped Quality regression fixtures"
          git push origin HEAD:agent/saas-control-plane-hardening
