name: Apply Rostering Load Optimizations

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Apply tab-scoped setup query loading
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          path = Path("frontend/src/pages/rostering/components/UnifiedRosterSettings.tsx")
          text = path.read_text(encoding="utf-8")
          if "TAB_SCOPED_QUERY_STALE_MS" in text:
              print("Setup loading optimization already applied")
              raise SystemExit(0)

          text = text.replace(
              "import {\n  useMemo,",
              "import {\n  useCallback,\n  useMemo,",
              1,
          )

          helper_start = text.find("function useSettingsQuery<T>")
          helper_end = text.find("export function UnifiedRosterSettings", helper_start)
          if helper_start < 0 or helper_end < 0:
              raise SystemExit("Settings query helper markers were not found")
          helper = textwrap.dedent('''
          const TAB_SCOPED_QUERY_STALE_MS = 5 * 60_000;
          const REFERENCE_QUERY_STALE_MS = 30 * 60_000;

          type AdaptiveNavigator = Navigator & {
            connection?: {
              saveData?: boolean;
              effectiveType?: string;
            };
          };

          function constrainedConnection(): boolean {
            if (typeof navigator === "undefined") return false;
            const connection = (navigator as AdaptiveNavigator).connection;
            return Boolean(
              connection?.saveData
              || connection?.effectiveType === "slow-2g"
              || connection?.effectiveType === "2g"
            );
          }

          function useSettingsQuery<T>(
            name: string,
            queryFn: () => Promise<T>,
            enabled: boolean,
            staleTime = TAB_SCOPED_QUERY_STALE_MS,
          ) {
            return useQuery({
              queryKey: ["rostering", "settings", name],
              queryFn,
              enabled,
              staleTime,
              gcTime: 24 * 60 * 60_000,
              networkMode: "offlineFirst",
              refetchOnMount: false,
              refetchOnWindowFocus: false,
            });
          }

          ''')
          text = text[:helper_start] + helper + text[helper_end:]

          query_start = text.find("  const periodsQuery =")
          query_end = text.find("  const permissions =", query_start)
          if query_start < 0 or query_end < 0:
              raise SystemExit("Setup query graph markers were not found")
          query_block = textwrap.indent(textwrap.dedent('''
          const periodsQuery = useSettingsQuery(
            "periods",
            () => listRosterPeriods(),
            tab === "periods" || tab === "patterns" || tab === "governance",
          );
          const shiftsQuery = useSettingsQuery(
            "shifts",
            () => listShiftTemplates(true),
            tab === "shifts" || tab === "patterns",
            REFERENCE_QUERY_STALE_MS,
          );
          const patternsQuery = useSettingsQuery(
            "patterns",
            () => listWorkPatterns(true),
            tab === "patterns",
          );
          const employmentQuery = useSettingsQuery(
            "contracts",
            () => listEmploymentContracts({ page_size: 200 }),
            tab === "contracts",
          );
          const leaveTypesQuery = useSettingsQuery(
            "leave-types",
            () => listLeaveTypes(true),
            tab === "leave",
            REFERENCE_QUERY_STALE_MS,
          );
          const leaveRequestsQuery = useSettingsQuery(
            "leave-requests",
            () => listLeaveRequests({ page_size: 200 }),
            tab === "approvals",
          );
          const timesheetsQuery = useSettingsQuery(
            "timesheets",
            () => listTimesheets({ page_size: 200 }),
            tab === "approvals",
          );
          const rulesQuery = useSettingsQuery(
            "rules",
            () => listRosterRules(true),
            tab === "rules",
            REFERENCE_QUERY_STALE_MS,
          );
          const peopleQuery = useSettingsQuery(
            "people",
            () => listAllRosterPeople({
              page_size: 250,
              active_only: true,
              roster_eligible_only: false,
            }),
            tab === "contracts" || tab === "governance",
            REFERENCE_QUERY_STALE_MS,
          );
          const permissionsQuery = useSettingsQuery(
            "permissions",
            getCurrentWorkforcePermissions,
            true,
            REFERENCE_QUERY_STALE_MS,
          );
          const contractsQuery = useSettingsQuery(
            "route-contracts",
            getRosterContracts,
            tab === "integration" || tab === "preferences",
            REFERENCE_QUERY_STALE_MS,
          );

          let activeQueries: QuerySnapshot[] = [permissionsQuery];
          switch (tab) {
            case "integration":
              activeQueries = [permissionsQuery, contractsQuery];
              break;
            case "periods":
              activeQueries = [permissionsQuery, periodsQuery];
              break;
            case "shifts":
              activeQueries = [permissionsQuery, shiftsQuery];
              break;
            case "patterns":
              activeQueries = [permissionsQuery, periodsQuery, shiftsQuery, patternsQuery];
              break;
            case "contracts":
              activeQueries = [permissionsQuery, employmentQuery, peopleQuery];
              break;
            case "leave":
              activeQueries = [permissionsQuery, leaveTypesQuery];
              break;
            case "rules":
              activeQueries = [permissionsQuery, rulesQuery];
              break;
            case "governance":
              activeQueries = [permissionsQuery, periodsQuery, peopleQuery];
              break;
            case "approvals":
              activeQueries = [permissionsQuery, leaveRequestsQuery, timesheetsQuery];
              break;
            case "preferences":
              activeQueries = [permissionsQuery, contractsQuery];
              break;
          }
          const activeLoading = activeQueries.some((query) => query.isPending && !query.data);
          '''), "  ") + "\n"
          text = text[:query_start] + query_block + text[query_end:]

          text, removed = re.subn(
              r'\n  if \(initialLoading\) \{\n    return <RosterLoading label="Loading tenant rostering setup…" />;\n  \}\n',
              "\n",
              text,
              count=1,
          )
          if removed != 1:
              raise SystemExit("Initial all-query loading gate was not found")

          bases_anchor = "  const bases = useMemo(() => {"
          bases_start = text.find(bases_anchor)
          bases_end = text.find("  }, [people]);", bases_start)
          if bases_start < 0 or bases_end < 0:
              raise SystemExit("Base selector memo markers were not found")
          bases_end += len("  }, [people]);")
          warm_tab = textwrap.indent(textwrap.dedent('''

          const warmTab = useCallback((nextTab: Tab) => {
            if (constrainedConnection()) return;
            const tasks: Array<Promise<unknown>> = [];
            const prefetch = <T,>(
              name: string,
              queryFn: () => Promise<T>,
              staleTime = TAB_SCOPED_QUERY_STALE_MS,
            ) => {
              tasks.push(queryClient.prefetchQuery({
                queryKey: ["rostering", "settings", name],
                queryFn,
                staleTime,
              }));
            };
            if (nextTab === "periods") prefetch("periods", () => listRosterPeriods());
            if (nextTab === "shifts") {
              prefetch("shifts", () => listShiftTemplates(true), REFERENCE_QUERY_STALE_MS);
            }
            if (nextTab === "patterns") {
              prefetch("periods", () => listRosterPeriods());
              prefetch("shifts", () => listShiftTemplates(true), REFERENCE_QUERY_STALE_MS);
              prefetch("patterns", () => listWorkPatterns(true));
            }
            if (nextTab === "contracts") {
              prefetch("contracts", () => listEmploymentContracts({ page_size: 200 }));
            }
            if (nextTab === "leave") {
              prefetch("leave-types", () => listLeaveTypes(true), REFERENCE_QUERY_STALE_MS);
            }
            if (nextTab === "rules") {
              prefetch("rules", () => listRosterRules(true), REFERENCE_QUERY_STALE_MS);
            }
            if (nextTab === "governance") prefetch("periods", () => listRosterPeriods());
            if (nextTab === "approvals") {
              prefetch("leave-requests", () => listLeaveRequests({ page_size: 200 }));
              prefetch("timesheets", () => listTimesheets({ page_size: 200 }));
            }
            if (nextTab === "preferences" || nextTab === "integration") {
              prefetch("route-contracts", getRosterContracts, REFERENCE_QUERY_STALE_MS);
            }
            void Promise.allSettled(tasks);
          }, [queryClient]);
          '''), "  ")
          text = text[:bases_end] + warm_tab + text[bases_end:]

          text = text.replace(
              '            onClick={() => setTab(id)}',
              '            onPointerEnter={() => warmTab(id)}\n            onClick={() => setTab(id)}',
              1,
          )

          integration_pattern = re.compile(
              r'      \{tab === "integration" \? \(\s*<IntegrationPanel[\s\S]*?/>\s*\) : null\}',
          )
          replacement = '''      {!activeLoading && tab === "integration" ? (
            <IntegrationPanel
              contractMap={contractsQuery.data || null}
              queries={[permissionsQuery, contractsQuery]}
            />
          ) : null}'''
          text, count = integration_pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit("Integration panel render block was not found")

          for tab_name in (
              "periods", "shifts", "patterns", "contracts", "leave",
              "rules", "governance", "approvals", "preferences",
          ):
              old = f'{{tab === "{tab_name}" ? ('
              if old not in text:
                  raise SystemExit(f"Render block for {tab_name} was not found")
              text = text.replace(old, f'{{!activeLoading && tab === "{tab_name}" ? (', 1)

          first_panel = '      {!activeLoading && tab === "integration" ? ('
          if first_panel not in text:
              raise SystemExit("First optimized panel marker was not found")
          text = text.replace(
              first_panel,
              '      {activeLoading ? (\n        <RosterLoading label={`Loading ${TABS.find((item) => item.id === tab)?.label || "setup"}…`} />\n      ) : null}\n\n' + first_panel,
              1,
          )

          integration_start = text.find("function IntegrationPanel(")
          integration_end = text.find("function PeriodsPanel", integration_start)
          if integration_start < 0 or integration_end < 0:
              raise SystemExit("Integration component markers were not found")
          integration = textwrap.dedent('''
          function IntegrationPanel({
            contractMap,
            queries,
          }: {
            contractMap: RosterContractResponse | null;
            queries: QuerySnapshot[];
          }) {
            const failures = queries.filter((query) => query.error).length;
            const loading = queries.filter((query) => query.isFetching).length;

            return (
              <section className="wr-panel">
                <div className="wr-section-heading">
                  <div>
                    <span className="wr-eyebrow">Canonical data contract</span>
                    <h2>Tenant workforce integration</h2>
                  </div>
                  <StatusPill value={failures ? "DEGRADED" : loading ? "SYNCING" : "CONNECTED"} />
                </div>

                <div className="wr-card-grid">
                  <article className="wr-setup-card">
                    <div><UsersRound size={18} /><strong>On demand</strong></div>
                    <h3>Tenant personnel</h3>
                    <p>Canonical key: <code>{contractMap?.canonical_personnel_key || "accounts.users.id"}</code></p>
                    <small>
                      The complete tenant personnel dataset loads only when Contracts or Roster
                      approval is opened. Planner eligibility remains independently paginated.
                    </small>
                  </article>

                  <article className="wr-setup-card">
                    <div><BadgeCheck size={18} /><strong>{contractMap?.phase || "workforce-integrated"}</strong></div>
                    <h3>Source ownership</h3>
                    <p>Leave remains in Workforce, training in Training, audits in Quality and duty in Rostering.</p>
                    <small>The planner projects source records instead of creating duplicate employee states.</small>
                  </article>

                  <article className="wr-setup-card">
                    <div><ShieldCheck size={18} /><strong>{failures}</strong></div>
                    <h3>Unavailable data sources</h3>
                    <p>{failures ? "The integration contract is temporarily unavailable; setup tabs remain isolated." : "The initial integration sources responded."}</p>
                    <small>Inactive tabs make no API requests until opened.</small>
                  </article>
                </div>

                {contractMap ? (
                  <div className="wr-data-list">
                    {Object.entries(contractMap.source_modules).map(([name, source]) => (
                      <article className="wr-data-row" key={name}>
                        <div><strong>{name.replace(/_/g, " ")}</strong><small>{source}</small></div>
                        <StatusPill value="SOURCE OF TRUTH" />
                      </article>
                    ))}
                  </div>
                ) : (
                  <SectionFailure title="Integration contract" error={queries.find((query) => query.error)?.error} />
                )}
              </section>
            );
          }

          ''')
          text = text[:integration_start] + integration + text[integration_end:]
          path.write_text(text, encoding="utf-8")
          PY
      - name: Validate optimized frontend
        working-directory: frontend
        shell: bash
        run: |
          set +e
          {
            npm ci --prefer-offline --no-audit --fund=false
            install_status=$?
            echo "install_status=$install_status"
            if [ "$install_status" -eq 0 ]; then npm run build; build_status=$?; else build_status=1; fi
            echo "build_status=$build_status"
            if [ "$build_status" -eq 0 ]; then npm exec -- vitest run src/pages/rostering src/services/offlineHttp.test.ts; test_status=$?; else test_status=1; fi
            echo "test_status=$test_status"
            if [ "$test_status" -eq 0 ]; then npm exec -- eslint src/pages/rostering src/services/rostering.ts; lint_status=$?; else lint_status=1; fi
            echo "lint_status=$lint_status"
          } > /tmp/rostering-load-optimization-validation.log 2>&1
          status=0
          if [ "$install_status" -ne 0 ] || [ "$build_status" -ne 0 ] || [ "$test_status" -ne 0 ] || [ "$lint_status" -ne 0 ]; then status=1; fi
          echo "$status" > /tmp/rostering-load-optimization-validation.exit-code
          cat /tmp/rostering-load-optimization-validation.log
          exit 0
      - name: Upload optimization diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rostering-load-optimization-diagnostics
          path: |
            /tmp/rostering-load-optimization-validation.log
            /tmp/rostering-load-optimization-validation.exit-code
            frontend/src/pages/rostering/components/UnifiedRosterSettings.tsx
          retention-days: 1
      - name: Commit optimized setup loading
        shell: bash
        run: |
          test "$(cat /tmp/rostering-load-optimization-validation.exit-code)" = "0"
          rm -f .github/workflows/apply-rostering-load-optimizations.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend .github/workflows/apply-rostering-load-optimizations.yml
          git commit -m "Optimize rostering setup data loading"
          git push origin HEAD:fix/rostering-unified-workforce
