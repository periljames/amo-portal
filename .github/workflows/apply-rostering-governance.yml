name: Apply Rostering Governance Integration

on:
  push:
    branches:
      - fix/rostering-unified-workforce

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
      - name: Integrate governance, rules and calendar feed
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              text = read(path)
              if old not in text:
                  raise SystemExit(f"Expected block not found in {path}: {old[:120]!r}")
              write(path, text.replace(old, new, count))

          def between(path: str, start: str, end: str, replacement: str) -> None:
              text = read(path)
              left = text.find(start)
              if left < 0:
                  raise SystemExit(f"Start marker not found in {path}: {start!r}")
              right = text.find(end, left)
              if right < 0:
                  raise SystemExit(f"End marker not found in {path}: {end!r}")
              write(path, text[:left] + replacement + text[right:])

          # ------------------------------------------------------------------
          # ORM models
          # ------------------------------------------------------------------
          models = "backend/amodb/apps/rostering/models.py"
          replace(
              models,
              '''class RosterRuleType(str, Enum):
