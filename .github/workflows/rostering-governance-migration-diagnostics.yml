name: Rostering Governance Migration Diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rostering_governance_diag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rostering_governance_diag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_ENV: test
      ALLOW_SQLITE_FOR_TESTS: "1"
      SECRET_KEY: rostering-governance-diagnostic-secret
      PLATFORM_SECRETS_KEY: "5T4IWN4Fkif7LtiH2tGLHSrAX2tyvDEh6bXCWf7cRpU="
      QUALITY_SCHEMA_STRICT: "0"
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/rostering_governance_diag
      DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/rostering_governance_diag
      DATABASE_READ_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/rostering_governance_diag
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: pip install --disable-pip-version-check -r backend/requirements.txt
      - name: Capture clean migration
        working-directory: backend
        shell: bash
        run: |
          set +e
          alembic -c amodb/alembic.ini upgrade heads > /tmp/rostering-governance-migration.log 2>&1
          status=$?
          cat /tmp/rostering-governance-migration.log
          echo "$status" > /tmp/rostering-governance-migration.exit-code
          exit 0
      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rostering-governance-migration-diagnostics
          path: |
            /tmp/rostering-governance-migration.log
            /tmp/rostering-governance-migration.exit-code
          retention-days: 1
