name: Workforce PostgreSQL Hotfix

on:
  pull_request:
    paths:
      - "backend/amodb/alembic/versions/workforce_20260721_complete_rostering.py"
      - "backend/amodb/alembic/versions/workforce_20260721_precreate_tables.py"
      - "backend/amodb/apps/rostering/models.py"
      - ".github/workflows/workforce-postgres-hotfix.yml"

permissions:
  contents: read

jobs:
  postgres-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_migration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Apply pending migration-chain edits
        run: |
          python - <<'PY'
          from pathlib import Path

          migration = Path("amodb/alembic/versions/workforce_20260721_complete_rostering.py")
          source = migration.read_text(encoding="utf-8")
          source = source.replace("Revises: qual_20260705_merge_heads", "Revises: workforce_20260721_precreate")
          source = source.replace('down_revision = "qual_20260705_merge_heads"', 'down_revision = "workforce_20260721_precreate"')
          migration.write_text(source, encoding="utf-8")

          models = Path("amodb/apps/rostering/models.py")
          source = models.read_text(encoding="utf-8")
          source = source.replace(
              'Index("ix_roster_rules_scope", "amo_id", "scope", "department_id", "base_station_id")',
              'Index("ix_wr_roster_rules_scope", "amo_id", "scope", "department_id", "base_station_id")',
          )
          models.write_text(source, encoding="utf-8")
          PY
      - name: Run focused PostgreSQL migration
        id: migrate
        continue-on-error: true
        env:
          APP_ENV: test
          SECRET_KEY: migration-test-secret
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_migration_test
          DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_migration_test
        run: |
          set -o pipefail
          {
            echo "=== Build current-database baseline ==="
            python - <<'PY'
          import os
          from importlib import import_module

          import sqlalchemy as sa
          from sqlalchemy import create_engine

          from amodb.database import Base

          for module_name in (
              "amodb.apps.accounts.models",
              "amodb.apps.foundations.models",
              "amodb.apps.training.models",
              "amodb.apps.work.models",
              "amodb.apps.rostering.models",
              "amodb.apps.workforce.models",
          ):
              import_module(module_name)

          new_tables = {
              "roster_rules", "roster_rule_exceptions", "roster_demand_requirements",
              "roster_command_receipts", "employment_contracts", "work_patterns",
              "work_pattern_days", "employee_work_pattern_assignments", "leave_types",
              "employee_leave_balances", "leave_requests", "leave_request_approvals",
              "employee_availability_events", "public_holiday_calendars", "public_holidays",
              "attendance_events", "timesheets", "timesheet_lines", "overtime_requests",
              "overtime_approvals", "roster_actual_variances", "workforce_permission_grants",
              "training_event_time_windows", "roster_planner_preferences",
              "workforce_notification_preferences",
          }

          baseline = sa.MetaData()
          manual = {
              "amos": [sa.Column("id", sa.String(36), primary_key=True), sa.Column("time_zone", sa.String(64))],
              "departments": [sa.Column("id", sa.String(36), primary_key=True)],
              "users": [sa.Column("id", sa.String(36), primary_key=True), sa.Column("department_id", sa.String(36))],
              "base_stations": [sa.Column("id", sa.String(36), primary_key=True)],
              "shift_templates": [sa.Column("id", sa.String(36), primary_key=True), sa.Column("amo_id", sa.String(36))],
              "roster_periods": [sa.Column("id", sa.String(36), primary_key=True), sa.Column("amo_id", sa.String(36))],
              "roster_versions": [sa.Column("id", sa.String(36), primary_key=True), sa.Column("amo_id", sa.String(36))],
              "roster_assignments": [
                  sa.Column("id", sa.String(36), primary_key=True),
                  sa.Column("amo_id", sa.String(36)),
                  sa.Column("version_id", sa.String(36)),
                  sa.Column("user_id", sa.String(36)),
                  sa.Column("starts_at", sa.DateTime(timezone=True)),
                  sa.Column("ends_at", sa.DateTime(timezone=True)),
              ],
              "roster_validation_findings": [
                  sa.Column("id", sa.String(36), primary_key=True),
                  sa.Column("amo_id", sa.String(36)),
                  sa.Column("version_id", sa.String(36)),
                  sa.Column("user_id", sa.String(36)),
                  sa.Column("resolved", sa.Boolean(), nullable=False, server_default=sa.text("false")),
              ],
              "roster_publication_acknowledgements": [
                  sa.Column("id", sa.String(36), primary_key=True),
                  sa.Column("amo_id", sa.String(36)),
                  sa.Column("version_id", sa.String(36)),
                  sa.Column("user_id", sa.String(36)),
                  sa.Column("acknowledged_at", sa.DateTime(timezone=True)),
              ],
          }
          for table_name, columns in manual.items():
              sa.Table(table_name, baseline, *columns)

          referenced: dict[str, dict[str, sa.Column]] = {}
          for table_name in new_tables:
              table = Base.metadata.tables[table_name]
              for foreign_key in table.foreign_keys:
                  target = foreign_key.column
                  target_table = target.table.name
                  if target_table in new_tables or target_table in manual:
                      continue
                  referenced.setdefault(target_table, {})[target.name] = target

          for table_name, columns in referenced.items():
              stub_columns = []
              for column_name, source_column in columns.items():
                  stub_columns.append(
                      sa.Column(
                          column_name,
                          source_column.type,
                          primary_key=bool(source_column.primary_key or column_name == "id"),
                      )
                  )
              sa.Table(table_name, baseline, *stub_columns)

          engine = create_engine(os.environ["DATABASE_URL"])
          baseline.create_all(engine)
          PY
            echo "=== Stamp current merge-head baseline ==="
            alembic -c amodb/alembic.ini stamp qual_20260705_merge_heads
            echo "=== Seed schema-global index collisions ==="
            python - <<'PY'
          import os
          from sqlalchemy import create_engine, text

          engine = create_engine(os.environ["DATABASE_URL"])
          with engine.begin() as connection:
              connection.execute(text("CREATE TABLE migration_collision_probe (id integer)"))
              connection.execute(text("CREATE INDEX ix_roster_rules_scope ON migration_collision_probe (id)"))
              connection.execute(text("CREATE INDEX ix_roster_rules_amo_active ON migration_collision_probe (id)"))
          PY
            echo "=== Upgrade workforce revision ==="
            alembic -c amodb/alembic.ini upgrade workforce_20260721_complete
            echo "=== Verify migrated schema ==="
            python - <<'PY'
          import os
          from sqlalchemy import create_engine, text

          engine = create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as connection:
              revision = connection.execute(
                  text("SELECT version_num FROM alembic_version WHERE version_num = 'workforce_20260721_complete'")
              ).scalar_one()
              roster_table = connection.execute(text("SELECT to_regclass('public.roster_rules')")).scalar_one()
              indexes = set(
                  connection.execute(
                      text("SELECT indexname FROM pg_indexes WHERE schemaname = 'public' AND tablename = 'roster_rules'")
                  ).scalars()
              )
          assert revision == "workforce_20260721_complete"
          assert roster_table == "roster_rules"
          assert "ix_wr_roster_rules_scope" in indexes
          assert any(name.startswith("ix_roster_rules_amo_active__roster_rules") for name in indexes), indexes
          PY
          } 2>&1 | tee workforce-postgres-migration.log
      - name: Upload focused migration log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: workforce-postgres-migration-log
          path: backend/workforce-postgres-migration.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail when migration failed
        if: steps.migrate.outcome != 'success'
        run: exit 1
