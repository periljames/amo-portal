name: Workforce PostgreSQL Hotfix

on:
  pull_request:
    paths:
      - "backend/amodb/alembic/versions/workforce_20260721_complete_rostering.py"
      - "backend/amodb/alembic/versions/workforce_20260721_precreate_tables.py"
      - "backend/amodb/apps/rostering/models.py"
      - ".github/workflows/workforce-postgres-hotfix.yml"

permissions:
  contents: read

jobs:
  postgres-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_migration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Apply pending migration-chain edits
        run: |
          python - <<'PY'
          from pathlib import Path

          migration = Path("amodb/alembic/versions/workforce_20260721_complete_rostering.py")
          source = migration.read_text(encoding="utf-8")
          source = source.replace("Revises: qual_20260705_merge_heads", "Revises: workforce_20260721_precreate")
          source = source.replace('down_revision = "qual_20260705_merge_heads"', 'down_revision = "workforce_20260721_precreate"')
          migration.write_text(source, encoding="utf-8")

          models = Path("amodb/apps/rostering/models.py")
          source = models.read_text(encoding="utf-8")
          source = source.replace(
              'Index("ix_roster_rules_scope", "amo_id", "scope", "department_id", "base_station_id")',
              'Index("ix_wr_roster_rules_scope", "amo_id", "scope", "department_id", "base_station_id")',
          )
          models.write_text(source, encoding="utf-8")
          PY
      - name: Run focused PostgreSQL migration
        id: migrate
        continue-on-error: true
        env:
          APP_ENV: test
          SECRET_KEY: migration-test-secret
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_migration_test
          DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_migration_test
        run: |
          set -o pipefail
          {
            echo "=== Upgrade to qual_20260705_merge_heads ==="
            alembic -c amodb/alembic.ini upgrade qual_20260705_merge_heads
            echo "=== Seed schema-global collision ==="
            python - <<'PY'
          import os
          from sqlalchemy import create_engine, text
          engine = create_engine(os.environ["DATABASE_URL"])
          with engine.begin() as connection:
              connection.execute(text("CREATE TABLE migration_collision_probe (id integer)"))
              connection.execute(text("CREATE INDEX ix_roster_rules_scope ON migration_collision_probe (id)"))
          PY
            echo "=== Upgrade workforce revision ==="
            alembic -c amodb/alembic.ini upgrade workforce_20260721_complete
          } 2>&1 | tee workforce-postgres-migration.log
      - name: Upload focused migration log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: workforce-postgres-migration-log
          path: backend/workforce-postgres-migration.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail when migration failed
        if: steps.migrate.outcome != 'success'
        run: exit 1
