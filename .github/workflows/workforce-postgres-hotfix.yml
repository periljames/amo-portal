name: Workforce PostgreSQL Hotfix

on:
  pull_request:
    paths:
      - "backend/amodb/alembic/versions/workforce_20260721_complete_rostering.py"
      - "backend/amodb/alembic/versions/workforce_20260721_precreate_tables.py"
      - "backend/amodb/apps/rostering/models.py"
      - "backend/amodb/apps/rostering/tests/postgres_migration_probe.py"
      - ".github/workflows/workforce-postgres-hotfix.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgres-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_migration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run PostgreSQL migration collision probe
        id: migrate
        continue-on-error: true
        env:
          APP_ENV: test
          SECRET_KEY: migration-test-secret
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_migration_test
          DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_migration_test
        shell: bash
        run: |
          set -o pipefail
          python -m amodb.apps.rostering.tests.postgres_migration_probe 2>&1 | tee workforce-postgres-migration.log
      - name: Upload PostgreSQL migration diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: workforce-postgres-migration-log
          path: backend/workforce-postgres-migration.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail when migration failed
        if: steps.migrate.outcome != 'success'
        run: exit 1
