name: Alembic Legacy Upgrade Compatibility

on:
  pull_request:
    paths:
      - "backend/amodb/alembic/**"
      - "backend/amodb/apps/rostering/tests/test_alembic_legacy_head_contract.py"
      - "backend/amodb/scripts/alembic_legacy_upgrade_probe.py"
      - ".github/workflows/alembic-legacy-upgrade-ci.yml"

permissions:
  contents: read

jobs:
  postgres-upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_alembic_legacy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_alembic_legacy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_ENV: test
      SECRET_KEY: alembic-legacy-upgrade-secret
      PLATFORM_SECRETS_KEY: "5T4IWN4Fkif7LtiH2tGLHSrAX2tyvDEh6bXCWf7cRpU="
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_alembic_legacy
      DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_alembic_legacy
      DATABASE_READ_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_alembic_legacy
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: >-
          python .github/scripts/retry_transient.py
          --attempts 4
          --label "Alembic legacy upgrade dependency install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r backend/requirements.txt
      - name: Verify immutable migration-history contract
        working-directory: backend
        run: pytest -q amodb/apps/rostering/tests/test_alembic_legacy_head_contract.py
      - name: Run fresh and legacy PostgreSQL upgrades
        working-directory: backend
        run: |
          set -o pipefail
          python -m amodb.scripts.alembic_legacy_upgrade_probe 2>&1 | tee /tmp/alembic-legacy-upgrade.log
      - name: Upload Alembic compatibility diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: alembic-legacy-upgrade
          path: /tmp/alembic-legacy-upgrade.log
          if-no-files-found: warn
          retention-days: 3
