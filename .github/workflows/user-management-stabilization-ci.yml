name: User Management Stabilization CI

on:
  pull_request:
    paths:
      - "backend/amodb/apps/accounts/**"
      - "backend/amodb/apps/workforce/**"
      - "backend/amodb/apps/realtime/**"
      - "frontend/src/pages/AdminDashboardPage.tsx"
      - "frontend/src/pages/admin-users/**"
      - "frontend/src/services/adminUserDirectory.ts"
      - "frontend/src/components/realtime/RealtimeProvider.tsx"
      - "frontend/src/styles/admin-user-management-v2.css"
      - ".github/scripts/retry_transient.py"
      - ".github/workflows/user-management-stabilization-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies with bounded transient retries
        run: >-
          python .github/scripts/retry_transient.py
          --attempts 4
          --label "user-management backend dependency install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r backend/requirements.txt
      - name: Compile affected backend modules
        run: python -m compileall -q backend/amodb/apps/accounts backend/amodb/apps/workforce backend/amodb/apps/realtime
      - name: Verify full mapper startup
        working-directory: backend
        env:
          APP_ENV: test
          ALLOW_SQLITE_FOR_TESTS: "1"
          DATABASE_URL: sqlite+pysqlite:///:memory:
          DATABASE_WRITE_URL: sqlite+pysqlite:///:memory:
          SECRET_KEY: mapper-test-secret
        run: python -c "from sqlalchemy.orm import configure_mappers; import amodb.main; configure_mappers(); print('All application mappers configured')"
      - name: Run account and workforce tests
        working-directory: backend
        env:
          APP_ENV: test
          ALLOW_SQLITE_FOR_TESTS: "1"
          SECRET_KEY: mapper-test-secret
        run: pytest -q amodb/apps/accounts/tests amodb/apps/workforce/tests
      - name: Install frontend dependencies with bounded transient retries
        working-directory: frontend
        run: >-
          python ../.github/scripts/retry_transient.py
          --attempts 4
          --label "user-management frontend dependency install"
          -- npm ci --prefer-offline --no-audit --fund=false
          --fetch-retries=5 --fetch-retry-mintimeout=10000 --fetch-retry-maxtimeout=60000
      - name: Typecheck and production build
        working-directory: frontend
        run: npm run build
      - name: Lint user management and presence changes
        working-directory: frontend
        run: npm exec -- eslint src/pages/AdminDashboardPage.tsx src/pages/admin-users src/services/adminUserDirectory.ts src/components/realtime/RealtimeProvider.tsx
