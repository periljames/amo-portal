name: Finalize Rostering Load Optimizations

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Apply demand-driven Setup source
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-rostering-load-optimizations.yml').read_text(encoding='utf-8').splitlines()
          start = source.index("          python - <<'PY'") + 1
          end = source.index("          PY", start)
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end]) + '\n'
          Path('/tmp/apply-setup-optimization.py').write_text(script, encoding='utf-8')
          PY
          python /tmp/apply-setup-optimization.py
      - name: Normalize supported calendar icons
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          for raw_path in (
              'frontend/src/pages/rostering/components/MyRosterWorkspace.tsx',
              'frontend/src/pages/rostering/components/RosterGovernancePanel.tsx',
          ):
              path = Path(raw_path)
              text = path.read_text(encoding='utf-8')
              if 'CalendarSync' not in text:
                  continue
              path.write_text(text.replace('CalendarSync', 'CalendarDays'), encoding='utf-8')
          PY
      - name: Validate production frontend and rostering regressions
        working-directory: frontend
        shell: bash
        run: |
          set +e
          {
            npm ci --prefer-offline --no-audit --fund=false
            install_status=$?
            echo "install_status=$install_status"
            if [ "$install_status" -eq 0 ]; then npm run build; build_status=$?; else build_status=1; fi
            echo "build_status=$build_status"
            if [ "$build_status" -eq 0 ]; then npm exec -- vitest run src/pages/rostering src/services/offlineHttp.test.ts; test_status=$?; else test_status=1; fi
            echo "test_status=$test_status"
            if [ "$test_status" -eq 0 ]; then npm exec -- eslint src/pages/rostering src/services/rostering.ts; lint_status=$?; else lint_status=1; fi
            echo "lint_status=$lint_status"
          } > /tmp/finalize-rostering-load.log 2>&1
          status=0
          if [ "$install_status" -ne 0 ] || [ "$build_status" -ne 0 ] || [ "$test_status" -ne 0 ] || [ "$lint_status" -ne 0 ]; then status=1; fi
          echo "$status" > /tmp/finalize-rostering-load.exit-code
          cat /tmp/finalize-rostering-load.log
          exit 0
      - name: Upload finalizer diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: finalize-rostering-load-diagnostics
          path: |
            /tmp/finalize-rostering-load.log
            /tmp/finalize-rostering-load.exit-code
            frontend/src/pages/rostering/components/UnifiedRosterSettings.tsx
            frontend/src/pages/rostering/components/MyRosterWorkspace.tsx
            frontend/src/pages/rostering/components/RosterGovernancePanel.tsx
          retention-days: 1
      - name: Commit optimized source
        shell: bash
        run: |
          test "$(cat /tmp/finalize-rostering-load.exit-code)" = "0"
          rm -f \
            .github/workflows/apply-rostering-load-optimizations.yml \
            .github/workflows/finalize-rostering-load-optimizations.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend .github/workflows
          git commit -m "Optimize rostering for constrained networks"
          git push origin HEAD:fix/rostering-unified-workforce
