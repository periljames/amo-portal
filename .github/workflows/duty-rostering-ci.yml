name: Duty Rostering CI

on:
  pull_request:
    paths:
      - "backend/amodb/apps/rostering/**"
      - "backend/amodb/apps/workforce/**"
      - "backend/amodb/alembic/versions/workforce_20260721_complete_rostering.py"
      - "frontend/src/pages/rostering/**"
      - "frontend/src/services/rostering.ts"
      - "frontend/src/services/workforce.ts"
      - "frontend/src/services/typedApi.ts"
      - "frontend/src/types/rostering.ts"
      - "frontend/src/types/workforce.ts"
      - "frontend/src/types/qms-zxing-augmentations.d.ts"
      - "frontend/src/styles/rostering-workforce.css"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/duty-rostering-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Verify Alembic graph and workforce head without database configuration
        env:
          DATABASE_URL: ""
          DATABASE_WRITE_URL: ""
        shell: bash
        run: |
          set +e
          python - <<'PY' > duty-rostering-alembic-head.log 2>&1
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          script = ScriptDirectory.from_config(Config("amodb/alembic.ini"))
          heads = script.get_heads()
          print("Alembic heads:", heads)
          assert "workforce_20260721_complete" in heads, heads
          workforce = script.get_revision("workforce_20260721_complete")
          assert workforce is not None
          assert workforce.down_revision == "qual_20260705_merge_heads", workforce.down_revision
          assert len(heads) == len(set(heads)), heads
          PY
          status=$?
          cat duty-rostering-alembic-head.log
          exit "$status"
      - name: Preserve Alembic diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: duty-rostering-alembic-head-log
          path: backend/duty-rostering-alembic-head.log
          if-no-files-found: error
          retention-days: 7
      - name: Compile new backend modules
        run: python -m compileall -q amodb/apps/workforce amodb/apps/rostering amodb/alembic/versions/workforce_20260721_complete_rostering.py
      - name: Run workforce and rostering tests
        shell: bash
        run: |
          set +e
          pytest -q amodb/apps/workforce/tests amodb/apps/rostering/tests > duty-rostering-pytest.log 2>&1
          status=$?
          cat duty-rostering-pytest.log
          exit "$status"
      - name: Preserve backend test diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: duty-rostering-pytest-log
          path: backend/duty-rostering-pytest.log
          if-no-files-found: error
          retention-days: 7

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck and production build
        shell: bash
        run: |
          set +e
          npm run build > duty-rostering-build.log 2>&1
          status=$?
          cat duty-rostering-build.log
          exit "$status"
      - name: Preserve frontend build diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: duty-rostering-frontend-build-log
          path: frontend/duty-rostering-build.log
          if-no-files-found: error
          retention-days: 7
      - name: Resolve compatible ESLint toolchain
        run: npm install --save-dev --save-exact eslint@9.39.1
      - name: Generate final lint cleanup
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/pages/rostering/components/RosterSettings.tsx")
          source = path.read_text(encoding="utf-8")
          source = source.replace("  RefreshCw,\n", "")
          source = source.replace('  const [versionPeriod, setVersionPeriod] = useState("");\n', "")
          path.write_text(source, encoding="utf-8")
          PY
      - name: Preserve corrected frontend sources and manifests
        uses: actions/upload-artifact@v6
        with:
          name: duty-rostering-corrected-frontend-files
          path: |
            frontend/package.json
            frontend/package-lock.json
            frontend/src/pages/rostering/components/RosterSettings.tsx
          if-no-files-found: error
          retention-days: 7
      - name: Lint rostering implementation
        shell: bash
        run: |
          set +e
          npm exec -- eslint src/pages/rostering src/services/rostering.ts src/services/workforce.ts src/services/typedApi.ts src/types/rostering.ts src/types/workforce.ts > duty-rostering-eslint.log 2>&1
          status=$?
          cat duty-rostering-eslint.log
          exit "$status"
      - name: Preserve frontend lint diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: duty-rostering-eslint-log
          path: frontend/duty-rostering-eslint.log
          if-no-files-found: error
          retention-days: 7
      - name: Run rostering unit tests
        run: npm exec -- vitest run src/pages/rostering
