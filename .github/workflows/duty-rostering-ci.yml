name: Duty Rostering CI

on:
  pull_request:
    paths:
      - "backend/amodb/apps/rostering/**"
      - "backend/amodb/apps/workforce/**"
      - "backend/amodb/alembic/versions/workforce_20260721_complete_rostering.py"
      - "backend/amodb/alembic/versions/workforce_20260721_precreate_tables.py"
      - "frontend/src/pages/rostering/**"
      - "frontend/src/services/rostering.ts"
      - "frontend/src/services/workforce.ts"
      - "frontend/src/services/typedApi.ts"
      - "frontend/src/types/rostering.ts"
      - "frontend/src/types/workforce.ts"
      - "frontend/src/types/qms-zxing-augmentations.d.ts"
      - "frontend/src/styles/rostering-workforce.css"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/duty-rostering-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_migration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Apply migration-chain hotfix source edits
        run: |
          python - <<'PY'
          from pathlib import Path

          migration = Path("amodb/alembic/versions/workforce_20260721_complete_rostering.py")
          source = migration.read_text(encoding="utf-8")
          source = source.replace("Revises: qual_20260705_merge_heads", "Revises: workforce_20260721_precreate")
          source = source.replace('down_revision = "qual_20260705_merge_heads"', 'down_revision = "workforce_20260721_precreate"')
          migration.write_text(source, encoding="utf-8")

          models = Path("amodb/apps/rostering/models.py")
          source = models.read_text(encoding="utf-8")
          source = source.replace(
              'Index("ix_roster_rules_scope", "amo_id", "scope", "department_id", "base_station_id")',
              'Index("ix_wr_roster_rules_scope", "amo_id", "scope", "department_id", "base_station_id")',
          )
          models.write_text(source, encoding="utf-8")

          test_file = Path("amodb/apps/rostering/tests/test_migration_contract.py")
          source = test_file.read_text(encoding="utf-8")
          source = source.replace(
              'MIGRATION = Path(__file__).resolve().parents[3] / "alembic" / "versions" / "workforce_20260721_complete_rostering.py"',
              'MIGRATION = Path(__file__).resolve().parents[3] / "alembic" / "versions" / "workforce_20260721_complete_rostering.py"\nPRECREATE = Path(__file__).resolve().parents[3] / "alembic" / "versions" / "workforce_20260721_precreate_tables.py"',
          )
          source = source.replace(
              'assert assignment_value(module, "down_revision") == "qual_20260705_merge_heads"',
              'assert assignment_value(module, "down_revision") == "workforce_20260721_precreate"\n    predecessor = ast.parse(PRECREATE.read_text(encoding="utf-8"))\n    assert assignment_value(predecessor, "revision") == "workforce_20260721_precreate"\n    assert assignment_value(predecessor, "down_revision") == "qual_20260705_merge_heads"',
          )
          test_file.write_text(source, encoding="utf-8")
          PY
      - name: Verify Alembic graph without database configuration
        env:
          DATABASE_URL: ""
          DATABASE_WRITE_URL: ""
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          script = ScriptDirectory.from_config(Config("amodb/alembic.ini"))
          heads = script.get_heads()
          print("Alembic heads:", heads)
          assert "workforce_20260721_complete" in heads, heads
          complete = script.get_revision("workforce_20260721_complete")
          predecessor = script.get_revision("workforce_20260721_precreate")
          assert complete.down_revision == "workforce_20260721_precreate"
          assert predecessor.down_revision == "qual_20260705_merge_heads"
          assert len(heads) == len(set(heads)), heads
          PY
      - name: Compile backend modules and migrations
        run: python -m compileall -q amodb/apps/workforce amodb/apps/rostering amodb/alembic/versions/workforce_20260721_complete_rostering.py amodb/alembic/versions/workforce_20260721_precreate_tables.py
      - name: Run workforce and rostering tests
        run: pytest -q amodb/apps/workforce/tests amodb/apps/rostering/tests
      - name: Reproduce collision and run PostgreSQL migration
        env:
          APP_ENV: test
          SECRET_KEY: migration-test-secret
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_migration_test
          DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_migration_test
        run: |
          alembic -c amodb/alembic.ini upgrade qual_20260705_merge_heads
          python - <<'PY'
          import os
          from sqlalchemy import create_engine, text

          engine = create_engine(os.environ["DATABASE_URL"])
          with engine.begin() as connection:
              connection.execute(text("CREATE TABLE migration_collision_probe (id integer)"))
              connection.execute(text("CREATE INDEX ix_roster_rules_scope ON migration_collision_probe (id)"))
          PY
          alembic -c amodb/alembic.ini upgrade workforce_20260721_complete
          python - <<'PY'
          import os
          from sqlalchemy import create_engine, text

          engine = create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as connection:
              revision = connection.execute(
                  text("SELECT version_num FROM alembic_version WHERE version_num = 'workforce_20260721_complete'")
              ).scalar_one()
              roster_table = connection.execute(text("SELECT to_regclass('public.roster_rules')")).scalar_one()
              indexes = set(connection.execute(text("SELECT indexname FROM pg_indexes WHERE schemaname = 'public' AND tablename = 'roster_rules'")).scalars())
          assert revision == "workforce_20260721_complete"
          assert roster_table == "roster_rules"
          assert "ix_wr_roster_rules_scope" in indexes
          PY
      - name: Commit validated hotfix sources
        if: github.event_name == 'pull_request' && github.head_ref == 'hotfix/workforce-postgres-index-collisions'
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add amodb/alembic/versions/workforce_20260721_complete_rostering.py amodb/apps/rostering/models.py amodb/apps/rostering/tests/test_migration_contract.py
          if git diff --cached --quiet; then
            echo "Validated hotfix files already committed."
          else
            git commit -m "fix: order workforce table creation before migration"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck and production build
        run: npm run build
      - name: Lint rostering implementation
        run: npm exec -- eslint src/pages/rostering src/services/rostering.ts src/services/workforce.ts src/services/typedApi.ts src/types/rostering.ts src/types/workforce.ts
      - name: Run rostering unit tests
        run: npm exec -- vitest run src/pages/rostering
