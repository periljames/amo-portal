name: Portal Rostering CI

on:
  pull_request:
    paths:
      - "backend/amodb/apps/rostering/**"
      - "backend/amodb/apps/workforce/**"
      - "backend/amodb/apps/accounts/**"
      - "backend/amodb/apps/realtime/**"
      - "frontend/src/pages/rostering/**"
      - "frontend/src/pages/AdminUserNewPage.tsx"
      - "frontend/src/components/Layout/**"
      - "frontend/src/components/offline/**"
      - "frontend/src/components/realtime/**"
      - "frontend/src/services/rostering.ts"
      - "frontend/src/services/workforce.ts"
      - "frontend/src/services/typedApi.ts"
      - "frontend/src/services/apiClient.ts"
      - "frontend/src/services/crs.ts"
      - "frontend/src/services/offlineHttp.ts"
      - "frontend/src/services/offlinePersistence.ts"
      - "frontend/src/styles/**"
      - "frontend/src/main.tsx"
      - "frontend/public/portal-sw.js"
      - "frontend/public/portal.webmanifest"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/duty-rostering-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portal-rostering-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Verify Alembic graph without database configuration
        env:
          DATABASE_URL: ""
          DATABASE_WRITE_URL: ""
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          script = ScriptDirectory.from_config(Config("amodb/alembic.ini"))
          heads = script.get_heads()
          print("Alembic heads:", heads)
          assert len(heads) == len(set(heads)), heads
          assert script.get_revision("workforce_20260721_complete") is not None
          PY
      - name: Compile affected backend modules
        run: python -m compileall -q amodb/apps/accounts amodb/apps/realtime amodb/apps/workforce amodb/apps/rostering
      - name: Verify complete SQLAlchemy mapper startup
        env:
          APP_ENV: test
          ALLOW_SQLITE_FOR_TESTS: "1"
          DATABASE_URL: sqlite+pysqlite:///:memory:
          DATABASE_WRITE_URL: sqlite+pysqlite:///:memory:
          SECRET_KEY: mapper-test-secret
        run: python -c "from sqlalchemy.orm import configure_mappers; import amodb.main; configure_mappers(); print('All application mappers configured')"
      - name: Run account, workforce and rostering tests
        env:
          APP_ENV: test
          ALLOW_SQLITE_FOR_TESTS: "1"
          SECRET_KEY: mapper-test-secret
        run: pytest -q amodb/apps/accounts/tests amodb/apps/workforce/tests amodb/apps/rostering/tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck and production build
        run: npm run build
      - name: Lint offline, theme and rostering implementation
        run: >-
          npm exec -- eslint
          src/main.tsx
          src/components/offline
          src/pages/rostering
          src/services/rostering.ts
          src/services/workforce.ts
          src/services/typedApi.ts
          src/services/apiClient.ts
          src/services/crs.ts
          src/services/offlineHttp.ts
          src/services/offlinePersistence.ts
      - name: Run rostering and offline regression tests
        run: npm exec -- vitest run src/pages/rostering src/services/offlineHttp.test.ts
