name: Duty Rostering CI

on:
  pull_request:
    paths:
      - "backend/amodb/apps/rostering/**"
      - "backend/amodb/apps/workforce/**"
      - "backend/amodb/alembic/versions/workforce_20260721_complete_rostering.py"
      - "frontend/src/pages/rostering/**"
      - "frontend/src/services/rostering.ts"
      - "frontend/src/services/workforce.ts"
      - "frontend/src/services/typedApi.ts"
      - "frontend/src/types/rostering.ts"
      - "frontend/src/types/workforce.ts"
      - "frontend/src/styles/rostering-workforce.css"
      - ".github/workflows/duty-rostering-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Verify Alembic has one repository head without database configuration
        env:
          DATABASE_URL: ""
          DATABASE_WRITE_URL: ""
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          script = ScriptDirectory.from_config(Config("amodb/alembic.ini"))
          heads = script.get_heads()
          print("Alembic heads:", heads)
          assert heads == ["workforce_20260721_complete"], heads
          PY
      - name: Compile new backend modules
        run: python -m compileall -q amodb/apps/workforce amodb/apps/rostering amodb/alembic/versions/workforce_20260721_complete_rostering.py
      - name: Run workforce and rostering tests
        run: pytest -q amodb/apps/workforce/tests amodb/apps/rostering/tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck and production build
        shell: bash
        run: |
          set +e
          npm run build > duty-rostering-build.log 2>&1
          status=$?
          cat duty-rostering-build.log
          exit "$status"
      - name: Preserve frontend build diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: duty-rostering-frontend-build-log
          path: frontend/duty-rostering-build.log
          if-no-files-found: error
          retention-days: 7
      - name: Lint rostering implementation
        run: npx eslint src/pages/rostering src/services/rostering.ts src/services/workforce.ts src/services/typedApi.ts src/types/rostering.ts src/types/workforce.ts
      - name: Run rostering unit tests
        run: npx vitest run src/pages/rostering
