name: Quality Module CI

on:
  pull_request:
    paths:
      - "backend/amodb/apps/quality/**"
      - "backend/amodb/apps/audit/**"
      - "backend/amodb/apps/notifications/**"
      - "backend/amodb/apps/tasks/**"
      - "backend/amodb/apps/exports/**"
      - "backend/amodb/alembic/versions/quality_*.py"
      - "backend/amodb/scripts/quality_module_internal_check.py"
      - "frontend/src/pages/Quality*.tsx"
      - "frontend/src/pages/QMS*.tsx"
      - "frontend/src/pages/qms/**"
      - "frontend/src/pages/qualityAudits/**"
      - "frontend/src/components/QMS/**"
      - "frontend/src/services/qms.ts"
      - "frontend/src/services/qmsAuditHubActions.ts"
      - "frontend/src/services/qmsAuditHubActions.test.ts"
      - "frontend/src/router.tsx"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/quality-module-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-module-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Verify Alembic graph and Quality revision
        env:
          DATABASE_URL: ""
          DATABASE_WRITE_URL: ""
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          script = ScriptDirectory.from_config(Config("amodb/alembic.ini"))
          heads = script.get_heads()
          print("Alembic heads:", heads)
          assert len(heads) == len(set(heads)), heads
          revision = script.get_revision("quality_20260722_schema_integrity")
          assert revision is not None
          assert revision.down_revision == "workforce_20260721_complete"
          PY
      - name: Run Quality backend and frontend contract check
        run: python -m amodb.scripts.quality_module_internal_check
      - name: Compile Quality backend
        run: python -m compileall -q amodb/apps/quality amodb/alembic/versions/quality_20260722_schema_integrity.py
      - name: Configure all SQLAlchemy mappers
        env:
          APP_ENV: test
          ALLOW_SQLITE_FOR_TESTS: "1"
          DATABASE_URL: sqlite+pysqlite:///:memory:
          DATABASE_WRITE_URL: sqlite+pysqlite:///:memory:
          SECRET_KEY: quality-mapper-test-secret
        run: python -c "from sqlalchemy.orm import configure_mappers; import amodb.main; configure_mappers(); print('All application mappers configured')"
      - name: Run Quality workflow and integration tests
        env:
          APP_ENV: test
          ALLOW_SQLITE_FOR_TESTS: "1"
          DATABASE_URL: sqlite+pysqlite:///:memory:
          DATABASE_WRITE_URL: sqlite+pysqlite:///:memory:
          SECRET_KEY: quality-test-secret
        run: >-
          pytest -q
          amodb/apps/quality/tests/test_workflow_transitions.py
          amodb/apps/quality/tests/test_audit_workflow_enforcement.py
          amodb/apps/quality/tests/test_audit_events.py
          amodb/apps/quality/tests/test_task_integrations.py
          amodb/apps/quality/tests/test_evidence_pack_exports.py

  postgres-schema-integrity:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amodb_quality_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amodb_quality_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run Quality fallback-schema hardening probe
        id: quality_schema
        continue-on-error: true
        env:
          APP_ENV: test
          SECRET_KEY: quality-postgres-test-secret
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_quality_test
          DATABASE_WRITE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/amodb_quality_test
        shell: bash
        run: |
          set -o pipefail
          python -m amodb.apps.quality.tests.postgres_schema_integrity_probe 2>&1 | tee quality-postgres-schema.log
      - name: Upload Quality schema diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: quality-postgres-schema-log
          path: backend/quality-postgres-schema.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail when Quality schema probe failed
        if: steps.quality_schema.outcome != 'success'
        run: exit 1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run Quality service regression tests
        run: npm run test:quality
      - name: Typecheck and production build
        run: npm run build
      - name: Lint Quality implementation
        run: >-
          npm exec -- eslint
          src/services/qms.ts
          src/services/qmsAuditHubActions.ts
          src/services/qmsAuditHubActions.test.ts
          src/pages/QualityAuditRunHubPage.tsx
          src/pages/QualityAuditScheduleDetailPage.tsx
          src/pages/QualityCarsPage.tsx
          src/pages/QualityEvidenceLibraryPage.tsx
          src/pages/QMSEventsPage.tsx
          src/pages/qms
          src/pages/qualityAudits
          src/components/QMS
