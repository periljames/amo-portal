name: Run Rostering Governance Integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
          show-progress: false
      - name: Extract audited governance patch
        shell: bash
        run: |
          python - <<'PY'
          import textwrap
          from pathlib import Path

          source = Path('.github/workflows/apply-rostering-governance.yml').read_text(encoding='utf-8').splitlines()
          start = source.index("          python - <<'PY'") + 1
          end = source.index("          PY", start)
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end]) + '\n'
          script = script.replace('StrictModel', 'RosterSchema')
          script = script.replace("              code: str'''.replace", "              code: str = Field(min_length=1, max_length=64)'''.replace")
          script = script.replace('expected_state_revision: Optional[int] = None', 'expected_state_revision: Optional[int] = Field(default=None, ge=1)')
          script = script.replace('idempotency_key: Optional[str] = Field(default=None, max_length=128)', 'idempotency_key: Optional[str] = Field(default=None, min_length=8, max_length=128)')
          script = script.replace('comment: Optional[str] = Field(default=None, max_length=2000)', 'comment: Optional[str] = None')

          role_start = script.find('replace(\n    permissions,\n    \'\'\'    if "supervisor"')
          role_end_marker = '\n\n# ------------------------------------------------------------------\n# Rule defaults and evaluators'
          role_end = script.find(role_end_marker, role_start)
          if role_start < 0 or role_end < 0:
              raise SystemExit('Role mapping patch call was not found')
          direct_role_patch = textwrap.dedent('''
          role_text = read(permissions)
          old_role = '    if "supervisor" in title or "shift lead" in title:\\n        return "DEPARTMENT_SUPERVISOR"\\n    return None'
          new_role = '    if "base manager" in title:\\n        return "BASE_MANAGER"\\n    if "department head" in title or title.startswith("head of ") or "department manager" in title or "line manager" in title:\\n        return "DEPARTMENT_HEAD"\\n    if "supervisor" in title or "shift lead" in title:\\n        return "DEPARTMENT_SUPERVISOR"\\n    return None'
          if old_role not in role_text:
              raise SystemExit('Current workforce role mapping was not found')
          write(permissions, role_text.replace(old_role, new_role, 1))
          ''')
          script = script[:role_start] + direct_role_patch + script[role_end:]

          publish_start = script.find('replace(\n    lifecycle,\n    \'\'\'    if actor_user_id == version.created_by_user_id:')
          publish_end = script.find('\n)\nreplace(\n    lifecycle,\n    \'\'\'                "route": route,', publish_start)
          if publish_start < 0 or publish_end < 0:
              raise SystemExit('Publish authority patch call was not found')
          direct_publish_patch = textwrap.dedent('''
          publish_text = read(lifecycle)
          old_publish_guard = '    if actor_user_id == version.created_by_user_id:\\n        raise ValueError("The roster creator cannot publish the same version")'
          new_publish_guard = '    if actor_user_id == version.created_by_user_id:\\n        raise ValueError("The roster creator cannot publish the same version")\\n    actor = db.query(account_models.User).filter(\\n        account_models.User.amo_id == version.amo_id,\\n        account_models.User.id == actor_user_id,\\n        account_models.User.is_active.is_(True),\\n    ).first()\\n    if not actor:\\n        raise ValueError("Roster publisher is not an active tenant user")\\n    governance.require_publish_authority(db, version=version, actor=actor)'
          if old_publish_guard not in publish_text:
              raise SystemExit('Current publish creator guard was not found')
          write(lifecycle, publish_text.replace(old_publish_guard, new_publish_guard, 1))
          ''')
          script = script[:publish_start] + direct_publish_patch + script[publish_end + 3:]

          calendar_start = script.find('replace(\n    lifecycle,\n    \'\'\'                "route": route,')
          calendar_end_marker = '\n\n# ------------------------------------------------------------------\n# Common serializer exposes approval progress'
          calendar_end = script.find(calendar_end_marker, calendar_start)
          if calendar_start < 0 or calendar_end < 0:
              raise SystemExit('Publication calendar context patch call was not found')
          direct_calendar_patch = textwrap.dedent('''
          calendar_text = read(lifecycle)
          old_calendar_context = '                "route": route,\\n                "user_id": user_id,'
          new_calendar_context = '                "route": route,\\n                "calendar_feed_path": f"/rostering/calendar/feed/{calendar_feed.calendar_token(amo_id=version.amo_id, user_id=user_id)}.ics",\\n                "user_id": user_id,'
          if old_calendar_context not in calendar_text:
              raise SystemExit('Current publication notification context was not found')
          write(lifecycle, calendar_text.replace(old_calendar_context, new_calendar_context, 1))
          ''')
          script = script[:calendar_start] + direct_calendar_patch + script[calendar_end:]

          common_start = script.find('replace(\n    common_path,\n    \'\'\'    permissions = set()')
          common_end_marker = '\n\n# ------------------------------------------------------------------\n# Public service facade'
          common_end = script.find(common_end_marker, common_start)
          if common_start < 0 or common_end < 0:
              raise SystemExit('Version serializer patch calls were not found')
          direct_common_patch = textwrap.dedent('''
          common_text = read(common_path)
          old_permission_block = '    permissions = set()\\n    if current_user is not None and db is not None:\\n        permissions = set(workforce_permissions.permissions_for_user(db, user=current_user))\\n    return schemas.RosterVersionRead('
          new_permission_block = '    permissions = set()\\n    approval_required = approval_approved = approval_pending = 0\\n    scoped_can_approve = False\\n    scoped_can_publish = False\\n    if current_user is not None and db is not None:\\n        permissions = set(workforce_permissions.permissions_for_user(db, user=current_user))\\n        from . import governance\\n        approvals = governance.approval_rows(db, version_id=row.id)\\n        approval_required = len(approvals)\\n        approval_approved = sum(item.status == models.RosterDepartmentApprovalStatus.APPROVED for item in approvals)\\n        approval_pending = sum(item.status != models.RosterDepartmentApprovalStatus.APPROVED for item in approvals)\\n        scoped_can_approve = any(\\n            item.status != models.RosterDepartmentApprovalStatus.APPROVED\\n            and governance.can_approve_scope(db, user=current_user, department_id=item.department_id, base_station_id=item.base_station_id)\\n            for item in approvals\\n        )\\n        scoped_can_publish = bool(approvals) and all(\\n            item.status == models.RosterDepartmentApprovalStatus.APPROVED\\n            and governance.can_publish_scope(db, user=current_user, department_id=item.department_id, base_station_id=item.base_station_id)\\n            for item in approvals\\n        )\\n    return schemas.RosterVersionRead('
          old_action_block = '        acknowledgement_count=0,\\n        can_edit=row.status == models.RosterVersionStatus.DRAFT and workforce_permissions.PermissionCode.ROSTER_EDIT.value in permissions,\\n        can_submit=row.status == models.RosterVersionStatus.DRAFT and blockers == 0 and workforce_permissions.PermissionCode.ROSTER_SUBMIT.value in permissions,\\n        can_approve=row.status == models.RosterVersionStatus.SUBMITTED and workforce_permissions.PermissionCode.ROSTER_APPROVE.value in permissions,\\n        can_publish=row.status == models.RosterVersionStatus.APPROVED and blockers == 0 and workforce_permissions.PermissionCode.ROSTER_PUBLISH.value in permissions,'
          new_action_block = '        acknowledgement_count=0,\\n        approval_required_count=approval_required,\\n        approval_approved_count=approval_approved,\\n        approval_pending_count=approval_pending,\\n        can_edit=row.status == models.RosterVersionStatus.DRAFT and workforce_permissions.PermissionCode.ROSTER_EDIT.value in permissions,\\n        can_submit=row.status == models.RosterVersionStatus.DRAFT and blockers == 0 and workforce_permissions.PermissionCode.ROSTER_SUBMIT.value in permissions,\\n        can_approve=row.status == models.RosterVersionStatus.SUBMITTED and scoped_can_approve,\\n        can_publish=row.status == models.RosterVersionStatus.APPROVED and blockers == 0 and scoped_can_publish,'
          if old_permission_block not in common_text or old_action_block not in common_text:
              raise SystemExit('Current version serializer blocks were not found')
          common_text = common_text.replace(old_permission_block, new_permission_block, 1).replace(old_action_block, new_action_block, 1)
          write(common_path, common_text)
          ''')
          script = script[:common_start] + direct_common_patch + script[common_end:]
          Path('/tmp/apply_rostering_governance.py').write_text(script, encoding='utf-8')
          PY
      - name: Apply audited full-stack governance patch
        shell: bash
        run: |
          set +e
          python /tmp/apply_rostering_governance.py > /tmp/rostering-governance-apply.log 2>&1
          status=$?
          cat /tmp/rostering-governance-apply.log
          echo "$status" > /tmp/rostering-governance-apply.exit-code
          exit "$status"
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rostering-governance-apply-diagnostics
          path: |
            /tmp/rostering-governance-apply.log
            /tmp/rostering-governance-apply.exit-code
          retention-days: 1
      - name: Validate and commit integrated source
        shell: bash
        run: |
          python -m compileall -q backend/amodb/apps/rostering backend/amodb/apps/workforce backend/amodb/alembic/versions/rostering_20260724_governance.py
          git diff --check
          rm -f .github/workflows/run-rostering-governance.yml
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend frontend .github/workflows/apply-rostering-governance.yml .github/workflows/run-rostering-governance.yml
          git commit -m "Add departmental roster governance and calendar subscriptions"
          git push origin HEAD:fix/rostering-unified-workforce
