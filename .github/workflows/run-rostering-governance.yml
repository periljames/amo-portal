name: Run Rostering Governance Integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
          show-progress: false
      - name: Extract audited governance patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-rostering-governance.yml').read_text(encoding='utf-8')
          workflow = workflow.replace(
              '''class RosterRuleBase(StrictModel):
              code: str''',
              '''class RosterRuleBase(RosterSchema):
              code: str = Field(min_length=1, max_length=64)''',
          ).replace(
              '''class RosterRuleBase(StrictModel):
              rule_set_id: Optional[str] = None
              code: str''',
              '''class RosterRuleBase(RosterSchema):
              rule_set_id: Optional[str] = None
              code: str = Field(min_length=1, max_length=64)''',
          ).replace(
              '''class RosterLifecycleRequest(StrictModel):
              expected_state_revision: Optional[int] = None
              idempotency_key: Optional[str] = Field(default=None, max_length=128)
              comment: Optional[str] = Field(default=None, max_length=2000)''',
              '''class RosterLifecycleRequest(RosterSchema):
              expected_state_revision: Optional[int] = Field(default=None, ge=1)
              idempotency_key: Optional[str] = Field(default=None, min_length=8, max_length=128)
              comment: Optional[str] = None''',
          ).replace(
              '''class RosterLifecycleRequest(StrictModel):
              expected_state_revision: Optional[int] = None
              idempotency_key: Optional[str] = Field(default=None, max_length=128)
              comment: Optional[str] = Field(default=None, max_length=2000)
              department_id: Optional[str] = None
              base_station_id: Optional[str] = None''',
              '''class RosterLifecycleRequest(RosterSchema):
              expected_state_revision: Optional[int] = Field(default=None, ge=1)
              idempotency_key: Optional[str] = Field(default=None, min_length=8, max_length=128)
              comment: Optional[str] = None
              department_id: Optional[str] = None
              base_station_id: Optional[str] = None''',
          ).replace(
              'marker = "class RosterRuleBase(StrictModel):"',
              'marker = "class RosterRuleBase(RosterSchema):"',
          )
          source = workflow.splitlines()
          start = source.index("          python - <<'PY'") + 1
          end = source.index("          PY", start)
          extracted = [line[10:] if line.startswith('          ') else line for line in source[start:end]]
          Path('/tmp/apply_rostering_governance.py').write_text('\n'.join(extracted) + '\n', encoding='utf-8')
          PY
      - name: Apply audited full-stack governance patch
        shell: bash
        run: |
          set +e
          python /tmp/apply_rostering_governance.py > /tmp/rostering-governance-apply.log 2>&1
          status=$?
          cat /tmp/rostering-governance-apply.log
          echo "$status" > /tmp/rostering-governance-apply.exit-code
          exit "$status"
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rostering-governance-apply-diagnostics
          path: |
            /tmp/rostering-governance-apply.log
            /tmp/rostering-governance-apply.exit-code
          retention-days: 1
      - name: Validate and commit integrated source
        shell: bash
        run: |
          python -m compileall -q backend/amodb/apps/rostering backend/amodb/apps/workforce backend/amodb/alembic/versions/rostering_20260724_governance.py
          git diff --check
          rm -f .github/workflows/run-rostering-governance.yml
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend frontend .github/workflows/apply-rostering-governance.yml .github/workflows/run-rostering-governance.yml
          git commit -m "Add departmental roster governance and calendar subscriptions"
          git push origin HEAD:fix/rostering-unified-workforce
