name: Run Rostering Governance Integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
          show-progress: false
      - name: Extract audited governance patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-rostering-governance.yml').read_text(encoding='utf-8').splitlines()
          start = source.index("          python - <<'PY'") + 1
          end = source.index("          PY", start)
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end]) + '\n'
          script = script.replace('StrictModel', 'RosterSchema')
          script = script.replace("              code: str'''.replace", "              code: str = Field(min_length=1, max_length=64)'''.replace")
          script = script.replace('expected_state_revision: Optional[int] = None', 'expected_state_revision: Optional[int] = Field(default=None, ge=1)')
          script = script.replace('idempotency_key: Optional[str] = Field(default=None, max_length=128)', 'idempotency_key: Optional[str] = Field(default=None, min_length=8, max_length=128)')
          script = script.replace('comment: Optional[str] = Field(default=None, max_length=2000)', 'comment: Optional[str] = None')
          malformed_old = "'''    if \"supervisor\" in title or \"shift lead\" in title:\n              return \"DEPARTMENT_SUPERVISOR\"\n              return None'''.replace(\"              \", \"    \")"
          corrected_old = "'''    if \"supervisor\" in title or \"shift lead\" in title:\n        return \"DEPARTMENT_SUPERVISOR\"\n    return None'''"
          malformed_new = "'''    if \"base manager\" in title:\n              return \"BASE_MANAGER\"\n              if \"department head\" in title or title.startswith(\"head of \") or \"department manager\" in title or \"line manager\" in title:\n              return \"DEPARTMENT_HEAD\"\n              if \"supervisor\" in title or \"shift lead\" in title:\n              return \"DEPARTMENT_SUPERVISOR\"\n              return None'''.replace(\"              \", \"    \")"
          corrected_new = "'''    if \"base manager\" in title:\n        return \"BASE_MANAGER\"\n    if \"department head\" in title or title.startswith(\"head of \") or \"department manager\" in title or \"line manager\" in title:\n        return \"DEPARTMENT_HEAD\"\n    if \"supervisor\" in title or \"shift lead\" in title:\n        return \"DEPARTMENT_SUPERVISOR\"\n    return None'''"
          if malformed_old not in script or malformed_new not in script:
              raise SystemExit('Role mapping literals were not found in the governance patch')
          script = script.replace(malformed_old, corrected_old, 1).replace(malformed_new, corrected_new, 1)
          Path('/tmp/apply_rostering_governance.py').write_text(script, encoding='utf-8')
          PY
      - name: Apply audited full-stack governance patch
        shell: bash
        run: |
          set +e
          python /tmp/apply_rostering_governance.py > /tmp/rostering-governance-apply.log 2>&1
          status=$?
          cat /tmp/rostering-governance-apply.log
          echo "$status" > /tmp/rostering-governance-apply.exit-code
          exit "$status"
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rostering-governance-apply-diagnostics
          path: |
            /tmp/rostering-governance-apply.log
            /tmp/rostering-governance-apply.exit-code
          retention-days: 1
      - name: Validate and commit integrated source
        shell: bash
        run: |
          python -m compileall -q backend/amodb/apps/rostering backend/amodb/apps/workforce backend/amodb/alembic/versions/rostering_20260724_governance.py
          git diff --check
          rm -f .github/workflows/run-rostering-governance.yml
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend frontend .github/workflows/apply-rostering-governance.yml .github/workflows/run-rostering-governance.yml
          git commit -m "Add departmental roster governance and calendar subscriptions"
          git push origin HEAD:fix/rostering-unified-workforce
