name: Alembic Legacy Graph Diagnostic

on:
  push:
    branches:
      - hotfix/alembic-legacy-head-convergence
  pull_request:
    paths:
      - "backend/amodb/alembic/versions/**"
      - ".github/workflows/alembic-legacy-graph-diagnostic.yml"

permissions:
  contents: read

jobs:
  graph:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: >-
          python .github/scripts/retry_transient.py
          --attempts 4
          --label "Alembic diagnostic dependency install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r backend/requirements.txt
      - name: Print complete revision graph
        working-directory: backend
        run: |
          set -o pipefail
          python - <<'PY' | tee /tmp/alembic-legacy-graph.log
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          script = ScriptDirectory.from_config(Config("amodb/alembic.ini"))
          print("HEADS", script.get_heads())
          for revision in script.walk_revisions():
              if (
                  revision.revision in {
                      "phase2_14a_20260615",
                      "workforce_20260721_precreate",
                      "workforce_20260721_complete",
                  }
                  or str(revision.revision).startswith("saas_20260722")
                  or str(revision.revision).startswith("quality_20260722")
              ):
                  print(
                      "REV",
                      revision.revision,
                      "DOWN",
                      revision.down_revision,
                      "NEXT",
                      tuple(sorted(revision.nextrev)),
                      "PATH",
                      revision.path,
                  )
          PY
      - name: Upload revision graph
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: alembic-legacy-graph
          path: /tmp/alembic-legacy-graph.log
          if-no-files-found: error
          retention-days: 2
