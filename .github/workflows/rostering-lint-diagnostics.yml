name: Apply Final Rostering Lint Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
      - name: Remove obsolete React import
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("frontend/src/pages/rostering/components/UnifiedRosterSettings.tsx")
          source = path.read_text(encoding="utf-8")
          path.write_text(source.replace("  useEffect,\n", "", 1), encoding="utf-8")
          PY
          git diff --check
          if git diff --quiet; then
            echo "Final lint fix already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/pages/rostering/components/UnifiedRosterSettings.tsx
          git commit -m "Remove obsolete rostering React import"
          git push origin HEAD:fix/rostering-unified-workforce
