name: Rostering Lint Diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Capture rostering lint diagnostics
        working-directory: frontend
        shell: bash
        run: |
          set +e
          npm exec -- eslint src/pages/rostering src/services/rosterCommitments.ts src/services/rostering.ts > rostering-lint.log 2>&1
          status=$?
          cat rostering-lint.log
          echo "$status" > rostering-lint.exit-code
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v6
        with:
          name: rostering-lint-diagnostics
          path: |
            frontend/rostering-lint.log
            frontend/rostering-lint.exit-code
          retention-days: 1
