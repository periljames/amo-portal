name: Diagnose Exact Rostering Governance Source

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/rostering-unified-workforce
          fetch-depth: 0
          show-progress: false
      - name: Reproduce exact repaired source
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          lines = Path('.github/workflows/commit-rostering-governance-source.yml').read_text(encoding='utf-8').splitlines()

          def extract(name: str, target: str) -> None:
              marker = f'      - name: {name}'
              start = lines.index(marker)
              run_line = next(index for index in range(start, len(lines)) if lines[index].strip() == 'run: |')
              end = next((index for index in range(run_line + 1, len(lines)) if lines[index].startswith('      - name: ')), len(lines))
              body = [line[10:] if line.startswith('          ') else line for line in lines[run_line + 1:end]]
              Path(target).write_text('\n'.join(body) + '\n', encoding='utf-8')

          extract('Reproduce successful governance transformation', '/tmp/reproduce-exact.sh')
          extract('Apply exact source repairs', '/tmp/repair-exact.sh')
          PY
          bash /tmp/reproduce-exact.sh
          bash /tmp/repair-exact.sh
      - name: Capture compiler diagnostics
        shell: bash
        run: |
          set +e
          python -m compileall backend/amodb/apps/rostering backend/amodb/apps/workforce backend/amodb/alembic/versions/rostering_20260724_governance.py > /tmp/rostering-governance-exact-compile.log 2>&1
          status=$?
          cat /tmp/rostering-governance-exact-compile.log
          echo "$status" > /tmp/rostering-governance-exact-compile.exit-code
          exit 0
      - name: Upload exact source diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rostering-governance-exact-compile-diagnostics
          path: |
            /tmp/rostering-governance-exact-compile.log
            /tmp/rostering-governance-exact-compile.exit-code
            backend/amodb/apps/rostering/validation.py
            backend/amodb/apps/rostering/catalog.py
          retention-days: 1
