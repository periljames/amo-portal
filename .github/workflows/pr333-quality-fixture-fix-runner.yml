name: PR333 Quality Fixture Fix Runner

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: pr333-quality-fixture-fix-runner
  cancel-in-progress: false

jobs:
  fix-and-validate:
    if: github.actor == 'periljames'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      APP_ENV: test
      ALLOW_SQLITE_FOR_TESTS: "1"
      SECRET_KEY: pr333-quality-fixture-fix-secret
      QUALITY_SCHEMA_STRICT: "0"
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      DATABASE_WRITE_URL: "sqlite+pysqlite:///:memory:"
      DATABASE_READ_URL: "sqlite+pysqlite:///:memory:"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/saas-control-plane-hardening
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies with bounded transient retries
        run: >-
          python .github/scripts/retry_transient.py
          --attempts 4
          --label "PR333 Quality fixture dependency install"
          -- pip install --disable-pip-version-check --retries 5 --timeout 60 -r backend/requirements.txt
      - name: Apply exact tenant fixture and dialect fixes
        run: python .github/scripts/apply_pr333_quality_fixture_fix.py
      - name: Compile changed Quality modules
        run: >-
          python -m py_compile
          backend/amodb/apps/quality/schema_compat.py
          backend/amodb/apps/quality/tests/test_workflow_transitions.py
          backend/amodb/apps/quality/tests/test_audit_workflow_enforcement.py
          backend/amodb/apps/quality/tests/test_audit_events.py
          backend/amodb/apps/quality/tests/test_task_integrations.py
          backend/amodb/apps/quality/tests/test_evidence_pack_exports.py
      - name: Run focused Quality regressions
        working-directory: backend
        run: >-
          pytest -q
          amodb/apps/quality/tests/test_quality_delivery_profile.py
          amodb/apps/quality/tests/test_workflow_transitions.py
          amodb/apps/quality/tests/test_audit_workflow_enforcement.py
          amodb/apps/quality/tests/test_audit_events.py
          amodb/apps/quality/tests/test_task_integrations.py
          amodb/apps/quality/tests/test_evidence_pack_exports.py
      - name: Verify Quality release contract
        run: python backend/amodb/scripts/quality_module_internal_check.py
      - name: Commit validated Quality fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/amodb/apps/quality/schema_compat.py \
            backend/amodb/apps/quality/tests/test_workflow_transitions.py \
            backend/amodb/apps/quality/tests/test_audit_workflow_enforcement.py \
            backend/amodb/apps/quality/tests/test_audit_events.py \
            backend/amodb/apps/quality/tests/test_task_integrations.py \
            backend/amodb/apps/quality/tests/test_evidence_pack_exports.py
          git diff --cached --check
          git commit -m "Repair tenant-scoped Quality regression fixtures"
          git push origin HEAD:agent/saas-control-plane-hardening
